        <script>
            let allowScreensaver = true;
            let isMobile = false;
            class BallotBox {
                constructor(question,opts,counts=[]) {
                    this.question = question;
                    this.opts = opts;
                    this.counts = counts;
                    for (let i = 0;i<this.opts.length;i++) {
                        this.counts.push(0);
                    }
                }
                saveCounts() {
                    localStorage.setItem("counts", this.counts.join(","));
                    localStorage.setItem("opts", this.opts.join(","));
                    localStorage.setItem("question", this.question);
                }
                increment(opt) {
                    this.counts[opt]++;
                    if (document.getElementById("bb"+opt)) {
                        document.getElementById('bb'+opt).innerText = this.counts[opt];
                    }
                    this.saveCounts();
                }
                decrement(opt) {
                    this.counts[opt]--;
                    if (this.counts[opt] < 0) {
                        this.counts[opt] = 0;
                    }
                    if (document.getElementById("bb"+opt)) {
                        document.getElementById('bb'+opt).innerText = this.counts[opt];
                    }
                    this.saveCounts();
                }
                endPoll() {
                    let isSure = confirm("End this poll? All data will be removed, do not do this unless the results have been written down or aren't needed any more.");
                    if (!isSure) {
                        return;
                    }
                    let counter = 0;
                    if (localStorage.getItem('question')) {
                        localStorage.removeItem('question')
                    }
                    if (localStorage.getItem('opts')) {
                        localStorage.removeItem('opts');
                    }
                    if (localStorage.getItem('counts')) {
                        localStorage.removeItem('counts');
                    }
                    document.getElementById('questionBox').innerHTML = '<hr><br><br><button onpointerdown="initBBpop()">Start Poll</button>';
                    qotd = null;
                }
                loadIntoElem(id) {
                    let html = '';
                    for (let i = 0;i<this.opts.length;i++) {
                        html += this.opts[i]+": <button onpointerdown='qotd.increment("+i+")'>+</button> <span id='bb"+i+"'>"+this.counts[i]+"</span> <button onpointerdown='qotd.decrement("+i+")'>-</button><br>";
                    }
                    document.getElementById(id).innerHTML =
                        "<hr>"+
                        this.question+"<br><br>" +
                        html +
                        "<br><br>" +
                        "<button onpointerdown='qotd.endPoll()'>End Poll</button>"
                }
            }
            // let qotd = new BallotBox("Is a hot dog a sandwich?", ["Yes", "No"]);
            let qotd = null;
            window.addEventListener('load', () => {
                // Load poll
                if (localStorage.getItem('question')) {
                    qotd = new BallotBox(localStorage.getItem('question'), localStorage.getItem('opts').split(","), localStorage.getItem('counts').split(","));
                }

            class Person {
                constructor(fName, lName, grade, addedDate=0, defaultVisits=true) {
                    this.fName = fName;
                    this.lName = lName;
                    this.grade = grade;
                    if (addedDate == 0) {
                        let date = new Date();
                        this.addedDate = (date.getMonth()+1)+"/"+date.getDate()+"/"+date.getFullYear();
                    } else {
                        this.addedDate = addedDate;
                    }
                    if (defaultVisits) {
                        this.visits = [this.addedDate];
                    } else {
                        this.visits = [];
                    }
                }
                getFullName() {
                    return this.fName+" "+this.lName;
                }
                toString() {
                    return this.fName+","+this.lName+","+this.grade+","+this.addedDate+","+this.visits.join("-");
                }
                checkIn() {
                    let d = new Date();
                    this.visits.push(
                        (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear()
                    );
                    savePeoples();
                }
                unCheckIn() {
                    this.visits.pop();
                    savePeoples();

                    // Below happens because this is triggered from a popup that needs to be refreshed
                    closepop();
                    todayPeople();
                }
            }

            window.addEventListener('keydown', (event) => {
                if (event.key == "Escape") {
                    closepop();
                }
            }, false);
            window.addEventListener('mousemove', actionHandler);
            window.addEventListener('keypress', actionHandler);
            let idleTimer;
            let idleFadeInt;
            function actionHandler() {
                // Called by mousemove and keypress event listeners
                if (idleTimer) {
                    clearTimeout(idleTimer);
                }
                if (idleFadeInt) {
                    clearInterval(idleFadeInt);
                }
                document.getElementById('screensaver').style.display = "none";
                document.body.style.cursor = '';
                idleTimer = setTimeout(showDVD, 10000);
            }
            function showDVD() {
                if (isMobile) {
                    return;
                }
                // Called by actionHandler()
                let i = 0;
                idleFadeInt = setInterval(() => {
                    document.getElementById('screensaver').style.display = "";
                    document.body.style.cursor = 'none';
                    document.getElementById('screensaver').style.opacity = i;
                    i += 0.01;
                    if (i >= 1) {
                        document.getElementById('screensaver').style.opacity = 1;
                        clearInterval(idleFadeInt);
                    }
                }, 10);
            }
            function popup(html) {
                // Generic popup
                if (document.getElementById('popup')) {
                    // Prevent multiple popups
                    return;
                }
                let pop = document.createElement('div');
                if (!isMobile) {
                    pop.style = "z-index:10;position:fixed;top:10%;left:10%;width:80%;height:80%;border:3px dashed #167cab;";
                } else {
                    pop.style = "z-index:10;position:absolute;top:0%;left:0%;width:100%;height:100%;";
                }
                pop.innerHTML = html;
                pop.setAttribute("id", "popup");
                let semi = document.createElement('div');
                // z-index of 8 to leave space for screen and highlighted content (see tutorial())
                semi.style = "z-index:7;position:fixed;top:0;left:0;width:100%;height:100%;background-color:black;opacity:0.5;";
                semi.setAttribute("id", "semi");
                document.body.appendChild(semi);
                document.body.appendChild(pop);
                document.getElementById('semi').addEventListener("click", (event) => {
                    closepop();
                    event.stopPropagation();
                }, false);
            }
            function closepop(bypassAllow=false) {
                // Close generic popup
                if ((allowClose || bypassAllow) && (document.getElementById("popup") && document.getElementById("semi"))) {
                    document.getElementById('popup').outerHTML = '';
                    document.getElementById('semi').outerHTML = '';
                } else {
                    console.log("Blocked closepop()");
                }
            }

            function savePeoples() {
                // Called from many places after updating peoples array
                let output = '';
                for (let i = 0;i<peoples.length;i++) {
                    output += peoples[i].toString()+";";
                }
                localStorage.setItem("peoples", output);
            }
            function mainMenu() {
                document.getElementById('content').innerHTML = mainHTML;
            }
            function saveBulk() {
                // Called from addBulk() popup
                let input = document.getElementById("userInput").value.split("\n");
                for (let i = 0;i<input.length;i++) {
                    let person = input[i].split(" ");
                    if (!person[2]) {
                        person[2] = 0;
                    }
                    peoples.push(new Person(person[0],person[1],person[2],0,false))
                }
                savePeoples();
                alert(input.length+" people saved!");
                // Close the add bulk popup
                closepop();
            }
            function todayPeople() {
                // Called from startCheckIn screen
                let todayList = [];
                let d = new Date();
                let today = (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();
                for (let i = 0;i<peoples.length;i++) {
                    if (peoples[i].visits.includes(today)) {
                        todayList.push(i);
                    }
                }
                let html = "";
                for (let i = 0;i<todayList.length;i++) {
                    // For Edit, the Edit Visits button is removed to prevent people from seeing past visits
                    // That is locked behind Graham's password, and should only be accessed from the View/Edit people button in the main menu
                    html += peoples[todayList[i]].getFullName()+" <button onpointerdown='peoples["+todayList[i]+"].unCheckIn()'>Undo Check-In</button> ~ <button onpointerdown='closepop();editPerson("+i+");document.getElementById(\"editVisitsButton\").outerHTML=\"\";'>Edit</button><br>";

                if (html == "") {

                }
                popup(

                    "Grade (zero if unknown): <input id='g' type='number'><br><br>" +
                    "<button onpointerdown='addPerson()'>Save</button>"
                )
            }
            function addPerson() {
                // Called from personPopup popup, from check-in session
                let fName = document.getElementById('fn').value;
                let lName = document.getElementById('ln').value;
                let g = parseInt(document.getElementById("g").value);
                let strikes = 0;
                if (isNaN(g) || g == "") {
                    strikes++;
                    g = 0;
                }
                if (fName == "") {
                    strikes++;
                    fName = "<Unknown>"
                }
                if (lName == "") {
                    strikes++;
                    lName = "<Unknown>"
                }
                if (strikes >= 3) {
                    alert("Cancelled");
                    return;
                }
                let index = peoples.push(
                    new Person(fName, lName, g)
                )
                peoples[index].checkIn();
                savePeoples();
                alert(peoples[index].getFullName()+" saved!");
            }

            function initBBpop() {
                // Called from startCheckIn() screen
                popup(
                    "<button onpointerdown='closepop()' style='float:left;'>X Close</button>" +
                    "<br><h1>Poll Setup</h1>" +
                    "Question: <input type='text' id='qIn' placeholder='Is a hot dog a sandwich?'><br><br>" +
                    "Answers (separate each with a comma): <input type='text' id='optsIn' placeholder='Yes,No'><br><br>" +
                    "<button onpointerdown='initBB()'>Continue</button>"
                )
            }
            function initBB() {
                try{
                if (qotd != null) {
                    let isSure = confirm("This will overwrite the existing poll. Continue?");
                    if (!isSure) {
                        return;
                    }
                }
                let opts = document.getElementById('optsIn').value.split(",");
                // Removed until it can be fixed
                /*for (let i = 0;i<opts.length;i++) {
                    // Remove any trailing spaces
                    if (opts[i].split("").indexOf(" ") != 0) {
                        let opt = opts[i].split("");
                        if (opt[opt.length-1] == " ") {
                            opt.pop();
                        }
                        opts[i] = opt;
                    }
                }*/
                if (opts.length == 0) {
                    alert("Please add options first");
                    return;
                }
                qotd = new BallotBox(document.getElementById('qIn').value, opts);
                qotd.saveCounts();
                closepop();
                qotd.loadIntoElem('questionBox');
                }catch(e){alert(e.stack)}
            }
            function lookupPerson(elem) {
                // Called from startCheckIn() screen
                let input = elem.value;
                let matches = [];
                let matchIndexes = [];
                let d = new Date()
                let today = (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();
                let alreadyChecked = false;
                function clearInput() {
                    elem.value = '';
                }
                for (let i = 0;i<peoples.length;i++) {
                    if (peoples[i].getFullName().toLowerCase().includes(input.toLowerCase())) {
                        if (!peoples[i].visits.includes(today)) {
                            matches.push(peoples[i].getFullName());
                            matchIndexes.push(i);
                        } else {
                            alreadyChecked = true;
                        }
                    }
                }
                if (matches.length <= 0) {
                    if (alreadyChecked) {
                        alert("No matches found. Maybe you already checked this person in? Try excluding part of the name, or add a person below")
                    } else {
                        alert("No matches found. Try excluding part of the name, or add a person below")
                    }
                } else if (matches.length == 1) {
                    peoples[matchIndexes[0]].checkIn();
                    alert(peoples[matchIndexes[0]].getFullName()+" checked in!")
                    savePeoples();
                    clearInput()
                } else {
                    // Multiple people popup here
                    let html = '';
                    for (let i = 0;i<matches.length;i++) {
                        html += "<button onpointerdown='choosePerson("+matchIndexes[i]+")'>"+peoples[matchIndexes[i]].getFullName()+"</button><br><br>"
                    }
                    popup(
                        "<button onpointerdown='closepop()' style='position:fixed;top:0;left:0;'>X Close</button>" +
                        "<br><h1>Select a person to check in:</h1>" +
                        html
                    )
                    clearInput();
                }
            }
            function choosePerson(index) {
                // Used in lookupPerson() when multiple matches are found
                peoples[index].checkIn();
                alert(peoples[index].getFullName() + " checked in!");
                savePeoples();
                closepop();
            }
            function seeVisits(index) {
                // Called by showPeople()
                popup(
                    "<button onpointerdown='closepop()' style='float:left;'>X Close</button><br><h1>"+peoples[index].getFullName()+"'s past visits</h1>" +
                    peoples[index].visits.join(" - ")
                )
            }
            function editPerson(index) {
                // Called by showPeople()
                popup(
                    "<button onpointerdown='closepop()' style='float:left;'>X Cancel</button>" +
                    "<br><h1>Edit "+peoples[index].getFullName()+"</h1>" +
                    "First name: <input id='fn' type='text' value='"+peoples[index].fName+"'><br>" +
                    "Last name: <input id='ln' type='text' value='"+peoples[index].lName+"'><br>" +
                    "Grade: <input id='g' type='number' value='"+peoples[index].grade+"'><br><br>" +
                    "Date added: "+peoples[index].addedDate+"<br>" +
                    "<br><button id='editVisitsButton' onpointerdown='editVisits("+index+")'>Edit Vists</button><br><br>" +
                    "<button onpointerdown='updatePerson("+index+")'>Save</button>"
                )
            }
            function updatePerson(index) {
                // Called by editPerson()'s popup
                peoples[index].fName = document.getElementById('fn').value;
                peoples[index].lName = document.getElementById('ln').value;
                peoples[index].grade = parseInt(document.getElementById('g').value);
                alert(peoples[index].getFullName() + " updated!");
                closepop();
                showPeople(index);
                savePeoples();
            }
            function editVisits(index) {
                // Called only after editPerson(), which opens a popup
                closepop();
                let html = '';
                for (let i = 0;i<peoples[index].visits.length;i++) {
                    html += peoples[index].visits[i] + ": <button onpointerdown='removeVisit("+index+","+i+")'>Remove Visit</button> - "
                }
                popup(
                    "<button onpointerdown='closepop()' style='float:left;'>X Cancel</button><br><h1>"+peoples[index].getFullName()+"'s Visits</h1>" +
                    html +
                    "<br><br>" +
                    "<button onpointerdown='addVisit("+index+")'>Add Missed Visit</button>"
                )
            }
            function removeVisit(index, i) {
                // Called from editVisits()
                let removed = peoples[index].visits.splice(i,1);
                alert("Removed visit "+removed+".")
                editVisits(index);
                savePeoples();
            }
            function addVisit(index) {
                // Called by editVisits popup
                let visit = prompt("Enter visit date (dd/mm/yyyy):");
                if (visit == null || visit == undefined || visit == "") {
                    return;
                }
                peoples[index].visits.push(visit);
                alert("Added a visit on "+visit+" to "+peoples[index].getFullName()+"!")
                savePeoples();
            }
            function toShowPeople(input=0) {
                // Called from main
                if (input == 0) {
                    popup(
                        "<button onpointerdown='closepop()' style='float:left;'>X Close</button>" +
                        "<br><h1>Verification</h1>" +
                        "Password: <input id='passIn' type='password' placeholder='Type here...' onkeydown='if(event.key==\"Enter\"){toShowPeople(this)}'>" +
                        " <button onpointerdown='toShowPeople(1)'>Continue</button>"
                    )
                    document.getElementById('passIn').focus();
                } else {
                    if (input == 1) {
                        input = document.getElementById('passIn');
                    }
                    if (input.value == atob("Z3BwYzIwMDk0MTE=")) {
                        showPeople(input.value);
                        closepop();
                    } else {
                        alert("Invalid password")
                        closepop();
                    }
                }
            }
            function showPeople(verification=0) {
                // Called from toShowPeople()
                if (verification != atob("Z3BwYzIwMDk0MTE=")) {
                    alert("An error occured")
                    return;
                }
                let html = '';
                for (let i = 0;i<peoples.length;i++) {
                    html += peoples[i].getFullName()+" <button onpointerdown='editPerson("+i+")'>Edit</button> <button onpointerdown='seeVisits("+i+")'>Show past visits</button><br><br>";
                }
                if (html == "") {
                    html = 'Nothing here yet!'
                }
                document.getElementById('content').innerHTML =
                    "<button onpointerdown='mainMenu()' style='position:fixed;top:0;left:0;'>Back</button>" +
                    "<br><h1>GP Youth Check-In</h1>" +
                    "All saved people:<br><br>" +
                    html;
            }
            function resetApp() {
                // Called from showOptions() popup
                let isSure = confirm("Reset this application? This will delete all data, including saved people and visits.")
                if (isSure) {
                    localStorage.removeItem('peoples')
                    alert("Reset complete")
                    location.reload();
                }
            }
            function toggleScreensaver(elem) {
                if (allowScreensaver) {
                    allowScreensaver = false;
                    alert("Screensaver disabled");
                    elem.innerText = "Enable Screensaver";
                } else {
                    allowScreensaver = true;
                    alert("Screensaver enabled!");
                    elem.innerText = "Disable Screensaver";
                }
            }
            function exportData() {
                // Called from showOptions() popup and report()
                // Shoutout to stackOverflow for this file download code; heavily modified to fit this application
                var fileName = "gpyCheckInExport.txt";
                var fileContent = "";
                for (let i = 0;i<peoples.length;i++) {
                    fileContent += peoples[i].toString()+";";
                }
                fileContent = btoa(fileContent);
                var elem = document.createElement("a");
                elem.setAttribute("href", 'data:text/plain;charset=utf-8,'+encodeURIComponent(fileContent));
                elem.setAttribute("download",fileName);
                elem.style.display = 'none';
                elem.click();
                document.body.removeChild(elem);
            }
            function importDataPopup() {
                // Called from showOptions() popup
                closepop();
                popup(
                    "<button onpointerdown='closepop();showOptions()' style='float:left;'>Back</button><br>" +
                    "<h1>File Import</h1>" +
                    "<input type='file' id='fileIn'> " +
                    "<br><br><i>Current data will NOT be overwritten</i>"
                )
                // w to internet peoples that post helpful things like the following lines
                let elem = document.getElementById('fileIn');
                elem.addEventListener('change', (event) => {
                    // Get the first file from the FileList object
                    const file = event.target.files[0];

                    if (file) {
                        // Create a new FileReader instance
                        const reader = new FileReader();

                        // Define what happens once the file is successfully read
                        reader.onload = function (e) {
                            // The file content is available in reader.result
                            const textContent = e.target.result;
                            importData(textContent);
                        };

                        // Define what happens if an error occurs
                        reader.onerror = function (e) {
                            alert("An error occured");
                        };

                        // Read the file content as a text string
                        reader.readAsText(file, 'UTF-8'); // Specify encoding (UTF-8 is default)
                    }
                });
            }
            function importData(input) {
                // Called from importDataPopup() popup
                // That's kinda redundant, huh...
                input = atob(input);
                input = input.split(";");
                for (let i = 0;i<input.length-1;i++) {
                    let person = input[i].split(",");
                    if (person.length == 4) {
                        peoples.push(new Person(person[0],person[1],person[2],person[3].split("-")))
                    } else if (person.length == 5) {
                        peoples.push(new Person(person[0],person[1],person[2],person[3].split("-"),person[4]))
                    } else {
                        alert("Error: failed to import person ["+person.join(",")+"]")
                    }
                }
                savePeoples();
                alert(input.length-1+" people saved!");
                closepop();
            }
            function showOptions() {
                // Called from main
                popup(
                    "<button onpointerdown='closepop()' style='float:left;'>X Close</button>" +
                    "<br><h1>Options</h1>" +
                    // So proud of myself for this; conditional strings, translates to if (allowScreensaver) {return "Disable Screensaver"} else {return "Enable Screensaver"}
                    "<button onpointerdown='toggleScreensaver(this)'>"+(allowScreensaver?"Disable Screensaver":"Enable Screensaver")+"</button><br><br>" +
                    "<button onpointerdown='exportData()'>Export Raw Data to file</button><br><br>" +
                    "<button onpointerdown='importDataPopup()'>Import Raw Data</button><br><br>" +
                    "<button onpointerdown='resetApp()' style='background-color:red;'>Reset</button>"
                )
            }
            let dvd = {
                pos: {
                    x: 0,
                    y: 0
                },
                slope: {
                    rise: 0.1,
                    run: 0.1
                }
            }
            setInterval(() => {
                // DVD movement
                dvd.pos.x += dvd.slope.run;
                dvd.pos.y += dvd.slope.rise;
                if (dvd.pos.x > 91.9 || dvd.pos.x < 0.1) {
                    dvd.slope.run = -dvd.slope.run;
                }
                if (dvd.pos.y > 85.9 || dvd.pos.y < 0.1) {
                    dvd.slope.rise = -dvd.slope.rise;
                }
                if (document.getElementById('screensaver').style.display != "none") {
                    document.getElementById("dvd").style.top = dvd.pos.y+"%";
                    document.getElementById("dvd").style.left = dvd.pos.x+"%";
                }
            }, 10);
            function report() {
                // Called by main menu
                let todayList = [];
                let d = new Date();
                let today = (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear();
                for (let i = 0;i<peoples.length;i++) {
                    if (peoples[i].visits.includes(today)) {
                        todayList.push(i);
                    }
                }
                let output = 'Date: '+today+"%0ATotal number of people checked in: "+todayList.length+"%0APeople Checked In Today:%0A";
                for (let i = 0;i<todayList.length;i++) {
                    output += peoples[todayList[i]].getFullName()+"%0A";
                }
                window.open("mailto:graham@gracepointsc.com?subject=Youth%20Check-In%20Report&body="+output);
                if (isMobile) {
                    popup(
                        "<br><br>A file should be downloading once you click the button below; please post it in the group chat so I can update the records<br>Thanks :)<br><br><button onpointerdown='closepop();exportData();'>Okay!</button>"
                    )
                }
            }
            // Stores screensaver settings for after tutorial ends
            let tempScreen = false;
            let inTutorial = false;
            function tutorial(prog=0,bypassPrompt=false) {
                inTutorial = true;
                let stillTutorial = true;
                let nextHTML = "<button onpointerdown='tutorial(-1)' style='position:fixed;top:0;left:0;z-index:20;'>X Exit Tutorial</button>"+"<br><button onpointerdown='tutorial("+(prog+1)+")'>Next</button>"
                function highlightElem(id) {
                    if (document.getElementById(id)) {
                        document.getElementById(id).style.zIndex = 8;
                        document.getElementById(id).style.position = "relative";
                    } else {
                        console.log("Failed to highlight: "+id);
                    }
                }
                function unHighlightElem(id) {
                    if (document.getElementById(id)) {
                        document.getElementById(id).style.zIndex = 1;
                        document.getElementById(id).style.position = "";
                    } else {
                        console.log("Failed to unhighlight: "+id);
                    }
                }
                function styleLower() {
                    document.getElementById("popup").style.top = "";
                    document.getElementById("popup").style.bottom = "3%";
                    document.getElementById("popup").style.height = "20%";
                }
                switch(prog) {
                    case -1:
                        let isSure;
                        if (!bypassPrompt) {
                            isSure = confirm("Exit tutorial?");
                        } else {
                            isSure = true;
                        }
                        if (!isSure) {
                            return;
                        }
                        stillTutorial = false;
                        break;
                    case 0:
                        tempScreen = allowScreensaver;
                        allowScreensaver = false;
                        allowClose = false;
                        closepop(true);
                        document.getElementById("tCheckIn").style.zIndex = 1;
                        popup(
                            "<br>Welcome to the home screen; this is where all the main actions can be taken."+nextHTML
                        )
                        styleLower();
                        break;
                    case 1:
                        closepop(true);
                        popup(
                            "<br>On a normal Sunday, this is where you'll go when check-in starts:"+nextHTML
                        )
                        styleLower();
                        highlightElem("tCheckIn");
                        break;
                    case 2:
                        unHighlightElem("tCheckIn");
                        closepop(true);
                        popup(
                            "<br>Most of these other buttons aren't used regularly; we'll be back to look at them later"+nextHTML
                        )
                        styleLower();
                        break;
                    case 3:
                        closepop(true);
                        document.getElementById("tCheckIn").click();
                        
                        // w stackoverflow for the following line; makes so much more sense than what I was trying lol
                        document.activeElement.blur();
                        popup(
                            "<br>This is what happens when you Begin Checking In. At the top, you'll see that text box. " +
                            "You can enter people's names, and this program looks them up. Hint: if you're not sure how to spell a name, " +
                            "it recognizes partial names too. For instance, you can put 'Jonah Deren' if you aren't certain how to spell 'DeRenzo'."+nextHTML
                        )
                        document.getElementById("popup").focus();
                        highlightElem("nameIn");
                        styleLower();
                        break;
                    case 4:
                        unHighlightElem("nameIn");
                        closepop(true);
                        popup(
                            "<br>If you can't find a person, or know for sure that they're new, you can add them " +
                            "using this button."+nextHTML
                        )
                        highlightElem("tAddB");
                        styleLower();
                        break;
                    case 5:
                        unHighlightElem("tAddB");
                        closepop(true);
                        popup(
                            "<br>If you want to see who all has checked in during a session, or check-in somebody by accident, "+
                            "you can use this button to view and undo check-in for these people."+nextHTML
                        )
                        highlightElem("tTodayB");
                        styleLower();
                        break;
                    case 6:
                        unHighlightElem("tTodayB");
                        closepop(true);
                        popup(
                            "<br>Once you're done for the day, you can use the End Session button to return to the main menu."+nextHTML
                        )
                        highlightElem("tEndB")
                        styleLower();
                        break;
                    case 7:
                        closepop(true);
                        mainMenu();
                        popup(
                            "<br>Now let's take a look at the other menus! If you know a large group of people are showing up and want "+
                            "to add them all at once, you can use this button to add many people at once."+nextHTML
                        )
                        highlightElem("tBulkB");
                        styleLower();
                        break;
                    case 8:
                        unHighlightElem("tBulkB");
                        closepop(true);
                        popup(
                            "<br>This menu can only be opened with Graham's password, for security reasons, and contains <b><u>all</u></b> the "+
                            "records for everybody, their grade (if available), when they were added to this database, and when they came to youth. "+
                            "You shouldn't need to worry about accessing this menu."+nextHTML
                        )
                        highlightElem("tViewB");
                        styleLower();
                        break;
                    case 9:
                        unHighlightElem("tViewB");
                        closepop(true);
                        popup(
                            "<br>This button is used after everybody has been checked-in, and will open a new tab with a pre-filled email report. This "+
                            "gets sent to Graham. Make sure to do this after every session, and be sure to actually click 'Send'."+nextHTML
                        )
                        highlightElem("tReportB");
                        styleLower();
                        break;
                    case 10:
                        unHighlightElem("tReportB");
                        closepop(true);
                        popup(
                            "<br>This last one opens a little popup for other options, such as disabling the epic screensaver, exporting/importing to and from "+
                            "files, resetting this program, and possibly more in the future. Shouldn't need to be messed with, but occasionally exporting the database, "+
                            "especially as it gets larger, is not a bad thing."+nextHTML
                        )
                        highlightElem("tOptB");
                        styleLower();
                        break;
                    case 11:
                        unHighlightElem("tOptB");
                        closepop(true);
                        popup(
                            "<br><br>That's all for this tutorial! If you have any questions, ask Graham, or you can text/call me at 803-626-2512.<br><br>" +
                            "<button onpointerdown='tutorial(-1,true)'>Sweet!</button>"
                        )
                        break;
                }
                if (stillTutorial) {
                    if (!document.getElementById('screen')) {
                        let screen = document.createElement("div");
                        screen.setAttribute('id', "screen");
                        // Highlighted content on z-index 8
                        screen.style = "position:fixed;top:0;left:0;width:100%;height:100%;z-index:9;background-color:transparent;";
                        document.body.appendChild(screen);
                    }
                } else {
                    inTutorial = false;
                    document.getElementById("screen").outerHTML = '';
                    allowScreensaver = tempScreen;
                    allowClose = true;
                    closepop();
                    mainMenu();
                }
            }
        </script>
    </head>
