<html>
    <head>
        <title>New WS Test</title>
        <script>
            const ws = new WebSocket("wss://utilities-8tvg.onrender.com/newWebSocketTestServer.js");
            ws.addEventListener('open', () => {
                logDiv.innerHTML += "<br>Connected";
            }, false);
            ws.addEventListener('error', (event) => {
                logDiv.innerHTML += "<br>Error; see console";
                console.error(event);
            }, false);
            function sendMsg(content) {
                ws.send(content);
            }
            ws.addEventListener('message', (e) => {
                logDiv.innerHTML += "<br>Received:"+e.data;
            }, false);
            ws.addEventListener('close', () => {
                logDiv.innerHTML += "<br>Disconnected";
            }, false);
        </script>
    </head>
    <body>
        <h1>Connection Log</h1>
        <div id="logDiv"></div>
        <hr>
        Send: <input type="text" onkeypress="if(event.key=='Enter'){sendMsg(this.value)}">
    </body>
    <script>
        logDiv = document.getElementById('logDiv');
    </script>
</html>
