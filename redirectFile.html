<html>
    <head>
        <title>Redirect Page</title>
        <style>
            body {
                background-color: black;
                color: lime;
                text-align: center;
                font-family: monospace;
            }
            a {
                color: lime;
            }
            a:hover {
                color: black;
                background-color: lime;
            }
            a:focus {
                color: black;
                background-color: lime;
            }
            button {
                color: lime;
                border: 2px outset lime;
                background-color: black;
            }
            button:hover {
                color: black;
                border: 2px outset black;
                background-color: lime;
            }
            button:focus {
                color: black;
                border: 2px outset black;
                background-color: lime;
            }
        </style>
        <script>
            let recentLinks = [];
            function customLink() {
                let url = prompt("Enter link:");
                if (url == undefined || url == null || url == "") {
                    return;
                }
                recentLinks.push(url);
                localStorage.setItem("recentRedLinks", recentLinks.join(";"));
                location.replace(url);
                document.getElementById('content').innerHTML = "Loading...";
                document.getElementById('clButton').style.display = 'none';
            }
            function removeLink(index) {
                let isSure = confirm("Remove link?");
                if (isSure) {
                    recentLinks[index] = "-";
                    loadContent();
                    localStorage.setItem("recentRedLinks", recentLinks.join(";"));
                }
            }
            function changeLink(index) {
                let url = prompt("Enter link:");
                if (url == undefined || url == null || url == "") {
                    return;
                }
                recentLinks[index] = url;
                loadContent();
            }
            function loadContent() {
                let html = "<h1>Recent Links</h1>";
                for (let i = 0;i<recentLinks.length;i++) {
                    if (recentLinks[i] != "-") {
                        html += (i+1)+". <a id='link"+i+"' href='"+recentLinks[i]+"'>"+recentLinks[i]+"</a>" +
                        " - <button onclick='changeLink("+i+")'>Update</button> - <button onclick='removeLink("+i+")'>Remove</button><br><br>";
                    }
                }
                if (html == "<h1>Recent Links</h1>") {
                    if (localStorage.getItem("recentRedLinks")) {
                        localStorage.removeItem("recentRedLinks");
                    }
                    html = "";
                }
                document.getElementById("content").innerHTML = html;
            }
            window.addEventListener('load', () => {
                if (localStorage.getItem('recentRedLinks')) {
                    recentLinks = localStorage.getItem('recentRedLinks').split(";");
                    loadContent();
                } else {
                    document.getElementById("content").innerHTML = "";
                }
            }, false);

            window.addEventListener('focus', () => {
                if (document.getElementById('content').innerHTML == "Loading...") {
                    loadContent();
                }
                if (document.getElementById('clButton').style.display == "none") {
                    document.getElementById('clButton').style.display = '';
                }
            }, false);

            let keylog = [];
            window.addEventListener('keydown', (event) => {
                if (!isNaN(parseInt(event.key))) {
                    keylog.push(event.key);
                }
                if (event.key == "Enter") {
                    if (keylog.length > 0) {
                        let id = parseInt(keylog.join("")-1);
                        document.getElementById('link'+id).click();
                        document.getElementById('content').innerHTML = "Loading...";
                        document.getElementById('clButton').style.display = 'none';
                    } else {
                        customLink();
                    }
                }
                if (event.key == "Backspace") {
                    keylog = [];
                }
            }, false);
        </script>
    </head>
    <body>
        <br>
        <div id='content'>
            Loading...
        </div>
        <button id="clButton" onclick="customLink()">Paste Custom Link</button>
    </body>
</html>
