<html>
    <head>
        <title>Father's Day 2026</title>
        <style>
            body {
                background-color: black;
            }
            div {
                color: white;
                font-family: "comic sans ms", helvetica;
                text-align: left;
                font-size: 48px;
            }
        </style>
        <script>
            setInterval(() => {
                if (window.innerWidth < window.innerHeight) {
                    document.getElementById("sidewaysNotif").style.display = '';
                } else {
                    document.getElementById("sidewaysNotif").style.display = 'none';
                }
                document.getElementById('sidewaysNotif').style.width = window.innerWidth;
                document.getElementById('sidewaysNotif').style.height = window.innerHeight;
            }, 1);
        </script>
    </head>
    <body>
        <div id="sidewaysNotif" style="z-index:100;position:fixed;top:0;left:0;width:100%;height:100%;background-color:darkblue;"><br><br>Hold your phone sideways :)</div>
        <img src="Father_s_Day_2026.png" style="z-index:1;position:fixed;top:0;left:0;width:100%;height:100%;">
    </body>
</html>
