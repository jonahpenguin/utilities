<html>
    <head>
        <title>Index</title>
        <link rel="stylesheet" href="Style1.css">
        <script src="systemAlerts.js"></script>
        <script>
            let linkNames = ["Just Escape", "DVD Homepage", "DVD game", "Typing Fidget", "DVD v2", "Gonculator", "Answer Checker", "Ad Free YT (SHHS ver)", "DVD logo", "Weight Calculator", "Ad Free YT", "Binary Game", "Link Locker"];
            let links = ["escapeGame.html", "dvdMain.html", "dvdGame.html", "typingFidget.html", "multiDVD.html", "gonculator.html", "answerChecker.html", "shhs.adFreeYT.html", "dvd.html", "weightCalc.html", "adFreeYT.html", "binaryGame.html", "linkLocker.html"];
            window.addEventListener('load', () => {
                if (localStorage.getItem(atob('aXNEZXY='))) {
                    dev(localStorage.getItem(atob('aXNEZXY=')),true);
                } else {
                    loadNormal();
                }
            }, false);
            function logOut() {
                let isSure = confirm('Log out?')
                if (isSure) {
                    localStorage.removeItem(atob('aXNEZXY='));
                    location.reload();
                }
            }
            function dev(pass=0,fromLocal=false) {
                if (pass == 0) {
                    pass = document.getElementById('passIn').value;
                }
                if (pass == atob("aW5kQHg=")) {
                    localStorage.setItem(atob('aXNEZXY='),pass)
                    document.getElementById('devBox').innerHTML = '<button onclick="logOut()">Log out</button>';
                    document.getElementById('helpBox').outerHTML = '';
                    loadNormal();
                    let devLinks = ["fathersDay2026.html", "buzzer.html", "redirectFile.html", "eagler1IlIlI||||IIIIII11IIIIIIIIIl11llllllllll|||||11IlIl11||||||11.html", "gpyCheckIn.html", "subwayVid.mp4", "dvd.png", "infinite.plat_editor.html"];
                    let html = '<hr><br><br>';
                    for (let i = 0;i<devLinks.length;i++) {
                        html += '<a href="'+devLinks[i]+'">'+devLinks[i]+'</a><br><br>';
                    }
                    document.getElementById('content').innerHTML += html;
                } else {
                    if (fromLocal) {
                        alert("Local storage error")
                    } else {
                        alert("Invalid password")
                    }
                }
            }
            window.addEventListener('keypress', (event) => {
                if (event.key == "Enter") {
                    dev();
                }
            }, false);
            function loadNormal() {
                let html = '';
                for (let i = 0;i<links.length;i++) {
                    html += '<a href="'+links[i]+'">'+linkNames[i]+'</a><br><br>';
                }
                document.getElementById('content').innerHTML = html+"<a href='/Game Archive/index.html'>Game Archive</a><br><br>";
            }
        </script>
    </head>
    <body>
        <br>
        <h1>Index</h1>
        <span id="helpBox">If you're finding yourself here, you probably were looking for one of these below pages :)</span>
        <br><br>
        <div id="content">
            Loading...
        </div>
        <br><br>
        <span id="devBox">
            Password: <input type="password" id="passIn" placeholder="Password...">
            <button onclick="dev()">Enable Developer Mode</button>
        </span>
    </body>
</html>
