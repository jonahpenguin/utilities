<html>
    <head>
        <title>Game Archive</title>
        <link rel="stylesheet" href="Style1.css">
        <script>
            class Game {
                constructor(name, url) {
                    this.name = name;
                    this.url = url;
                }
                launch() {
                    window.open(this.url);
                }
            }
            const games = [
                new Game("Block Dodger", "blockdodger.html"),
                new Game("Gambling game", "gambling.html"),
                new Game("Hangman", "hangman.html"),
                new Game("Mastermind Online", "mastermind.html"),
                new Game("Penguin Pong", "pong.html"),
                new Game("Racing Game", "racinggame.html"),
                new Game("Stupid Game", "stupidgame.html"),
                new Game("Tag", "tag.html")
            ];
            window.addEventListener('load', init);
            function init() {
                let content = document.getElementById('content');
                let html = '<br>';
                for (let i = 0;i<games.length;i++) {
                    html += "<button onclick=games["+i+"].launch()>"+games[i].name+"</button><br><br>";
                }
                content.innerHTML = html;
            }
        </script>
    </head>
    <body>
        <button style='position:fixed;top:0;left:0;' onclick="location.replace('https://utilities-8tvg.onrender.com')">Back to Index</button>
        <br>
        <h1>Game Archive</h1>
        <center>
            <div id="content">
                Loading...
            </div>
        </center>
    </body>
</html>
