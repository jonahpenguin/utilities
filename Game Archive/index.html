<html>
    <head>
        <title>Game Archive</title>
        <link rel="stylesheet" href="Style1.css">
        <script>
            class Game {
                constructor(name, url) {
                    this.name = name;
                    this.url = url;
                }
                launch() {
                    window.open(this.url);
                }
            }
            const games = [
                new Game("Block Dodger", "blockdodger.html"),
                new Game("Gambling game", "gambling.html"),
                new Game("Hangman", "hangman.html"),
                new Game("Mastermind Online", "mastermind.html"),
                new Game("Penguin Pong", "pong.html"),
                new Game("Racing Game", "racinggame.html"),
                new Game("Stupid Game", "stupidgame.html"),
                new Game("Tag", "tag.html"),
                new Game("Choose Your Path (Python Version)", "https://codehs.com/sandbox/jonahpenguin/choose-your-path-python-ver"),
                new Game("Ruins of Duskmere (Python Game)", "https://codehs.com/sandbox/jonahpenguin/ruins-of-duskmere/run"),
                new Game("Penguin Clicker", "penguinClicker.html")
            ];
            window.addEventListener('load', init);
            function init() {
                let content = document.getElementById('content');
                let html = '<br>';
                for (let i = 0;i<games.length;i++) {
                    html += "<button onclick=games["+i+"].launch()>"+games[i].name+"</button><br><br>";
                }
                content.innerHTML = html;
            }
        </script>
    </head>
    <body>
        <a href="https://utilities-8tvg.onrender.com/renderIndex.html">Back to Index</a>
        <br>
        <h1>Game Archive</h1>
        <center>
            <div id="content">
                Loading...
            </div>
        </center>
    </body>
</html>
