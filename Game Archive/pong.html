		#player {
			position:fixed;

		}

		    border-radius:10%;

			right:15%;
			width:3%;
			height:15%;

			border:3px dashed yellow;
		}

			position:fixed;
			top:0;
			left:0;

	</style>
    <script>
        // All default variables (except Tourney data)
        let gtimer;
        let gtime = 0;
    	let playerx = 45;
    	let moveint;
    	let moveint2;
    	let canmove = false;
    	let ismoving = false;
    	let emove = false;
    	let emoving = false;
    	let difficulty;
    	let autodiff = [1,1];
    	let enemyx = 45;
    	let entimer;
    	let atimer;
    	let score = [0,0];
    	let volleys = 0;
    	let capscore;
    	let ballint;
    	let ballspeed = 50;
    	let speedint;
    	let canscore = true;
	    let incvolley = true;
	    let scoreint;
	    let canclose = true;
    	let ballpos = {
    		x:0,

    	};

            },

                up: 'w',
                down: 's'
            }
        }
        let isdev = false;
        let mousetime = setTimeout(() => {
            document.body.style.cursor = 'none';
        }, 10000);
    	// Shows all variables and values
    	function showvar() {
    	    alert(
    	        'gtime=' + gtime + '\n' +

    	<script>
    	// When the tab is left, if the game is running, pause it
    	window.addEventListener('blur', () => {
    	    if (canmove) {
    	        pause();
    	    }
    	}, false);
    	function moveball() {
    		if (canmove) {
    		    if (canscore && ballpos.x == 3 && ballslope.run == -1) {
    		        canscore = false;
    		        scoreint = setTimeout(() => {canscore=true;}, 4000);
    		        score[1]++;
    		        updatescore();
    		    }
    		    if (canscore && ballpos.x == 87 && ballslope.run == 1) {
    		        canscore = false;
    		        scoreint = setTimeout(() => {canscore=true;}, 4000);
    		        score[0]++;
    		        updatescore();
    		    }
    		    if (ballpos.x == 45) {
    		        if (scoreint) {
    		            clearTimeout(scoreint);
    		            canscore = true;
    		        }
    		    }
    			ballpos.y = ballpos.y + ballslope.rise;
    			ballpos.x = ballpos.x + ballslope.run;
    			if (ballpos.x > 94 || ballpos.x < 1) {
    				if (ballslope.run == 1) {
    					ballslope.run = -1;
    				} else {
    					ballslope.run = 1;
    				}
    			}
    			if (ballpos.y < 1 || ballpos.y > 89) {
    				if (ballslope.rise == 1) {
    					ballslope.rise = -1;
    				} else {
    					ballslope.rise = 1;
    				}
    			}
    			if (ballpos.x <= 18 && ballpos.x > 10) {
    				if (ballpos.y+5 > playerx && ballpos.y+5 < playerx+15) {
    					ballslope.run = 1;	
    				}
    			}
    			if (ballpos.x >= 77 && ballpos.x < 90) {
    				if (ballpos.y+5 > enemyx && ballpos.y+5 < enemyx+15) {
    					ballslope.run = -1;
    				}
    			}
    			updateplayer(3);
    		}
    	}
    	function bounceball() {
    		if (ballslope.rise == 1) {
    			ballslope.rise = -1;
    		} else {
    			ballslope.rise = 1;
    		}
    		if (ballslope.run == 1) {
    			ballslope.run = -1;
    		} else {
    			ballslope.run = 1;
    		}
    	}
    	function updateplayer(p=1) {
    		if (p == 1) {
    			document.getElementById('player').style.top = playerx + '%';
    		} else if (p == 2) {
    			document.getElementById('enemy').style.top = enemyx + '%';
    		} else if (p == 3) {
    			document.getElementById('ball').style.top = ballpos.y + '%';
    			document.getElementById('ball').style.left = ballpos.x + '%';
    		}
    	}
    	// Player collision
    	function checkcolp() {
    		if (playerx < 0 || playerx > 84) {
    			return true;
    		} else {
    			return false;
    		}
    	}
    	// Enemy collision
    	function checkcole() {
    		if (enemyx < 0 || enemyx > 84) {
    			return true;
    		} else {
    			return false;
    		}
    	}
    	// Movement controls
    	window.addEventListener('keydown', (event) => {
    		if (canmove && !ismoving && difficulty != 0) {
    			switch(event.key) {
    				case controls.p1.up:
    					ismoving = true;
    					moveint = setInterval(() => {
    						playerx--;
    						let iscol = checkcolp();
    						if (iscol) {playerx++;}
    						updateplayer();
    					}, 10);
    					break;
    				case controls.p1.down:
    					ismoving = true;
    					moveint = setInterval(() => {
    						playerx++;
    						let iscol = checkcolp();
    						if (iscol) {playerx--;}
    						updateplayer();
    					}, 10);
    					break;
    			}
    		}
    		if (emove && !emoving) {
    			switch(event.key) {
    				case controls.p2.up:
    					emoving = true;
    					moveint2 = setInterval(() => {
    						enemyx--;
    						let iscol = checkcole();
    						if (iscol) {enemyx++;}
    						updateplayer(2);
    					}, 10);
    					break;
    				case controls.p2.down:
    					emoving = true;
    					moveint2 = setInterval(() => {
    						enemyx++;
    						let iscol = checkcole();
    						if (iscol) {enemyx--;}
    						updateplayer(2);
    					}, 10);
    					break;
    			}
    		}
    	}, false);
    	window.addEventListener('keyup', () => {
            if (event.key == 'm') {
                speedup();
            }
    		if (ismoving) {
    			if (event.key == controls.p1.up || event.key == controls.p1.down) {
    				ismoving = false;
    				clearInterval(moveint);
    			}
    		}
    		if (emoving) {
    			if (event.key == controls.p2.up || event.key == controls.p2.down) {
    				emoving = false;
    				clearInterval(moveint2);
    			}
    		}
    	}, false);
    	</script>
    	<script>
    	// Tourney

    	        } else {
    	            td.players[p].down = val;
    	        }
    	        elem.value = val;
    	        return false;
    	    }
    	}
    	// Opens the username and controls options for Tourney, as well as making Player objects if they don't exist; part of the chain of functions leading to the Tourney rounds
    	function psettings(setplayers=true) {
    	    let i = 1;
    	    if (setplayers) {
        	    while(i<td.players.length) {
        	        if (i%2 == 1) {
            	        td.players[i] = new Player('Player ' + i, 'ArrowUp', 'ArrowDown');
        	        } else {
            	        td.players[i] = new Player('Player ' + i, 'w', 's');
        	        }
        	        i++;
        	    }
    	        bb.outerHTML = '<button id="tb" onclick="dselect(6)" style="float:left;">Back</button>';
    	        header.innerText = 'Tourney Setup';
    	        i = 1;
    	    }
    	    let html = '';
    	    while(i<td.players.length) {
    	        html += '<button onclick="editp(' + i + ')">Edit ' + td.players[i].username + '\'s controls/username</button>';
    	        if (i!=td.players.length-1) {
    	            html += ' ~ ';
    	        }
    	        i++;
    	    }
    	    html += '<br><br><button onclick="showbracket()">Continue</button>'
    	    tsetup.innerHTML = html;
    	}
    	// Exits Tourney after confirmation
    	function endtourney() {
    	    let issure = confirm('End Tourney?\nAll settings will be lost.');
    	    if (issure) {
    	        loadgame();
    	    }
    	}
    	// Shows current bracket for Tourney
    	function showbracket() {
    	    let i = 1;
    	    let html = '';
    	    while(i<td.players.length) {
    	        html += td.players[i].username;
    	        if (i != td.players.length-1) {
    	            if (i%2 == 1) {
        	            html += ' vs ';
    	            } else {
    	                html += ' - ';
    	            }
    	        } else {
    	            if (i%2 == 1) {
        	            html += ' vs Winner of Previous';
    	            }
    	        }
    	        i++;
    	    }
    	    document.body.innerHTML =
    	        '<button onclick="endtourney()" style="float:left;">Exit Tourney</button>' +
    	        '<br>' +
    	        '<h1>Tourney Bracket [Round 1]</h1>' +
    	        html +
    	        '<br><br>' +
    	        '<button onclick="">Start First Round</button>';
    	}
    	// Edit username and control scheme for Tourney
    	function editp(p) {
    	    canclose = false;
    	    popup(
    	        '<br>' +
    	        '<h1>Editing ' + td.players[p].username + '</h1>' +
    	        'Username: <input type="text" placeholder="Type here..." onkeyup="td.players[' + p + '].username = this.value;" id="userin" value="' + td.players[p].username + '">' +
    	        '<br><hr>' +
    	        'Up: <input type="text" id="up" value="' + td.players[p].up + '" onkeydown="return td.setcont(this,event.key,' + p + ')"><br><br>' +
    	        'Down: <input type="text" id="down" value="' + td.players[p].down + '" onkeydown="return td.setcont(this,event.key,' + p + ')">' +
    	        '<br><br>' +
    	        '<button onclick="canclose=true; closepop(); psettings(false);">Save</button>'
    	    );
    	}
    	// Set duration for Tourney, then open Player settings
    	function settdur(d) {
    	    td.capscore = parseInt(d);
    	    psettings();
    	}
    	// Set the amount of players in Tourney; caps at 40
    	function setnop(elem) {
    	    if (elem.value > 40) {
    	       elem.value = 40; 
    	    }
    	    td.players.length = parseInt(elem.value)+1;
    	    elem.value = parseInt(td.players.length)-1;
    	}
    	
    	// End Tourney stuff
    	</script>

	// Load home screen and framing if not existing
        function loadgame() {
            if (document.getElementById('content')) {
                content.innerHTML =
                        '<button style="float:left;" onclick="editcont()">Edit Controls</button>' +
                        '<br>' +

    			        //'<br><br><br><br><hr>' +

            <script>
        // Would be total playing time but stats were scrapped
        setInterval(() => {
            if (canmove) {
                //stats.playtime++;
            }
        }, 1000);
        // Would load stats from localStorage but again stats were scrapped
        window.addEventListener('load', () => {
            if (localStorage.getItem('playtime')) {
                stats = {
    	            playtime: parseInt(localStorage.getItem('playtime')),
    	            p1wins: parseInt(localStorage.getItem('p1wins')),
    	            p2wins: parseInt(localStorage.getItem('p2wins')),
    	            comwins: parseInt(localStorage.getItem('comwins')),
    	            egames: parseInt(localStorage.getItem('egames')),
    	            megames: parseInt(localStorage.getItem('megames')),
    	            hargames: parseInt(localStorage.getItem('hargames')),
    	            hacgames: parseInt(localStorage.getItem('hacgames')),
    	            mugames: parseInt(localStorage.getItem('mugames'))
    	        }
            }
        }, false);
        // Would save stats but stats were scrapped
        function savestats() {
            return true;
            localStorage.setItem('playtime', stats.playtime);
            localStorage.setItem('p1wins', stats.p1wins);
            localStorage.setItem('p2wins', stats.p2wins);
            localStorage.setItem('comwins', stats.comwins);
            localStorage.setItem('egames', stats.egames);
            localStorage.setItem('megames', stats.megames);
            localStorage.setItem('hargames', stats.hargames);
            localStorage.setItem('hacgames', stats.hacgames);
            localStorage.setItem('mugames', stats.mugames);
        }
        // Mapping Escape to closepop() only if popup exists and not editing controls
        window.addEventListener('keydown', (event) => {
            if (event.key == 'Escape' && document.getElementById('popup')) {
                if (document.activeElement.id != 'p1up' && document.activeElement.id != 'p1down' && document.activeElement.id != 'p2up' && document.activeElement.id != 'p2down') {
                    closepop();
                }
            }
        }, false);
        // Clear stats
        function clearlocal() {
            localStorage.removeItem('playtime');
            localStorage.removeItem('p1wins');
            localStorage.removeItem('p2wins');
            localStorage.removeItem('comwins');
            localStorage.removeItem('egames');
            localStorage.removeItem('megames');
            localStorage.removeItem('hargames');
            localStorage.removeItem('hacgames');
            localStorage.removeItem('mugames');
        }
        // Would open stats but this was scrapped
        function openstats() {
            popup(
                '<button onclick="closepop()" style="float:left;">X Close</button>' +
                '<br>' +
                '<h1>Stats</h1>' +
                'Total playtime: ' + stats.playtime + ' second(s) (~' + Math.round(stats.playtime/60) + ' minute(s))<br>' +

                'Player 2 wins: ' + stats.p2wins + '<br>' +

            );
        }
        // Generic popup function; opens popup and takes a parameter for html inside the popup, and uses fancy semi to fade out background. Also makes sure the popup doesn't already exist
        function popup(html) {
            if (!document.getElementById('popup')) {
                let pop = document.createElement('div');
                pop.style = 'position:fixed;z-index:11;top:10%;left:10%;height:80%;width:80%;background-color:blue;border:3px dashed cyan;';
                pop.innerHTML = html;
                pop.setAttribute('id', 'popup');
                let semi = document.createElement('div');
                semi.style = 'position:fixed;z-index:10;top:0;left:0;height:100%;width:100%;background-color:black;opacity:0.5;';
                semi.setAttribute('id', 'semi');
                document.body.appendChild(pop);
                document.body.appendChild(semi);
            }
        }
        // Closes popup opened by popup()
        function closepop() {
            if (canclose) {
                document.getElementById('semi').outerHTML = '';
                document.getElementById('popup').outerHTML = '';
            }
        }
        // Calculates the percent chance of the com successfully hitting the ball back
        function getmc(value=difficulty) {
            switch(value) {
                case 1:
                    //easy
                    return 40;
                    break;
                case 2:
                    //medium
                    return 65;
                    break;
                case 3:
                    //hard
                    return 85;
                    break;
                case 4:
                    //hacker mode
                    return 99;
                    break;
            }
        }
        // Updates the scoreboard
        function updatescore() {
            volleys++;
            if (document.getElementById('scoreboard')) {
                document.getElementById('scoreboard').innerText = score[0] + '-' + score[1];
            }
            if (score[0] >= capscore || score[1] >= capscore) {
                endgame();
            }
        }
        // Ends the current game and determines the winner; sometimes declares that it is a tie even when that is false (fixed?)
        function endgame(usedq=false) {
            canmove = false;
            emove = false;
            if (scoreint) {
                clearTimeout(scoreint);
                canscore = true;
            }
            ballpos = {
                x:0,
                y:0
            };
            ballslope = {
    		    rise: 1,
    		    run: 1
    	    }
            //if (speedint) {
                clearTimeout(speedint);
            //}
            clearInterval(gtimer);
            ballspeed = 50;
            let headertext;
            let winner;
            if (score[0] >= capscore || score[0] > score[1]) {
                headertext = 'Player 1 wins!';
                stats.p1wins++;
                //savestats();
            } else if (score[1] >= capscore || score[1] > score[0]) {
                headertext = 'Player 2 wins!';
            } else {
                headertext = 'It\'s a tie!';
            }
            if (entimer) {
                clearInterval(entimer);
            }
            let gmin = Math.round(gtime/60);
            let min = 'minutes';
            if (gmin == 1) {

    function setcont(elem, val) {
        switch(elem.id) {
            case 'p1up':
                localStorage.setItem('pong1up', val);
                controls.p1.up = val;
                break;
            case 'p1down':
                localStorage.setItem('pong1down', val);
                controls.p1.down = val;
                break;
            case 'p2up':
                localStorage.setItem('pong2up', val);
                controls.p2.up = val;
                break;
            case 'p2down':
                localStorage.setItem('pong2down', val);
                controls.p2.down = val;
                break;
            default:
                alert('Something went wrong :/');
        }
        elem.value = val;
        return false;
    }
