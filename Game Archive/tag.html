					'<button onclick="loadready(2)" style="background-color: grey;"><img src="https://codehs.com/uploads/f6c6bb7d5c6eff3ad0ac91f977945725" class="mpre"><br>Backyard Map</button>' +
					'<button onclick="loadready(3)" style="background-color: grey;"><img src="https://codehs.com/uploads/c9b9941520ec0a8f97d1da3ce6ddd759" class="mpre"><br>Classic Map</button>' +
					'<button onclick="loadready(4)" style="background-color: grey;"><img src="https://codehs.com/uploads/462d717c601fee8b8c7a5935e9bb0758" class="mpre"><br>Garden Map</button>' +
					'<button onclick="loadready(5)" style="background-color: grey;"><img src="https://codehs.com/uploads/1648af76afde0c2aa6762581b6678d5b" class="mpre"><br>Bowling Map</button>' +
					'<button onclick="loadready(6)" style="background-color: grey;"><img src="https://codehs.com/uploads/4ac2df88b06d5e05ae7f5fc21194d4b3" class="mpre"><br>Road Map</button>';
				//}
			}
			function loadplayer() {
				player1 = document.getElementById('p1in').innerText;
				player2 = document.getElementById('p2in').innerText;
				if (localyes == true) {
					localStorage.setItem('player1', player1);
					localStorage.setItem('player2', player2);
				}
			}
			function getmap(mapint) {
				switch(mapint) {
					case 1:
						return 'Outer Space';
					case 2:
						return 'Backyard';
					case 3:
						return 'Classic';
					case 4:
						return 'Garden';
					case 5:
						return 'Bowling';
					case 6:
						return 'Road';
					default:
						alert('An error occured. Please try again.');
						location.replace('');
				}
			}
			function resetgame() {
				player1x = 0;
				player1y = 60;
				player2x = 100;
				player2y = 160;
				tagger = 0;
				timerno = 15;
				score1 = 0;
				score2 = 0;
				mapid = 0;
				loadgame();
			}
			function gametimeout() {
				var resetend = confirm('The game timer has ended. End game?');
				if (resetend == true) {
					main('pass');
				} else {
					alert('To end the game, use the end game button at the top right');
				}
			}
			function gametimer() {
				if (endtime == 0) {
					document.getElementById('gtimer').innerHTML = '';
					gametimeout();
					clearInterval(endtimer);
				} else if (infinitegame == true) {
					document.getElementById('gtimer').innerHTML = '';
				} else {
					endtime = endtime - 1;
					document.getElementById('gtimer').innerHTML =
						'Game timer:' +
						'<br>' +
						endtime + ' seconds left';
				}
			}
			function setgametimer() {
				if (endtime != -1) {
					endtimer = setInterval(() => {gametimer()}, 1000);
				} else {
					document.getElementById('gtimer').innerHTML = '';
				}
			}
			function inftime() {
				infinitegame = true;
				alert('Game timer set to infinite. \n Change the time in the textbox to undo and set.');
			}
			function checkno() {
				infinitegame = false;
				var timeset = document.getElementById('timein').value;
				if (timeset < 1) {
					document.getElementById('timein').value = 1;
					endtime = 60;
				} else {
					if (isminutes == true) {
						endtime = timeset * 60;
					} else {
						endtime = timeset;
					}
				}
			}
			function loadhud() {
				gameactive = true;
				totalgames++;
				if (localStorage.getItem('localyes')) {
					localStorage.setItem('totalgames', totalgames);
				}
				document.getElementById('hud').innerHTML =
					'<div id="gtimer" style="float: left;">' +
						'Game timer:' +
						'<br>' +
						'<span id="timerdisplay">Loading...</span>' +
					'</div>' +
					'<span id="tagging">' + player1 + ' is tagging in: </span>' +
					'<span id="time">15 second(s)</span>' +
					'<button style="float: right;" onclick="main()">End game</button>' +
					'<br>' +
					player1 + ' tags: <span id="p1score">0</span>' +
					'~' +
					player2 + ' tags: <span id="p2score">0</span>';
			}
			function changeunit() {
				if (isminutes == true) {
					isminutes = false;
					document.getElementById('units').innerText = 'seconds ';
					document.getElementById('unitbutton').innerText = 'Change to minutes';
				} else {
					isminutes = true;
					document.getElementById('units').innerText = 'minutes ';
					document.getElementById('unitbutton').innerText = 'Change to seconds';
				}
				checkno();
			}
			function loadready(mapid) {
				loadplayer();
				eval('map' + mapid + 'vis++');
				var mapvis = eval('map' + mapid + 'vis');
				if (localyes == true) {
					localStorage.setItem('map' + mapid + 'vis', mapvis);
				}
				var mapname = getmap(mapid);
				document.getElementById('content').innerHTML =
					'<button style="float: left;" onclick="loadgame()"><- Back to Main Menu</button>' +
					'<br>' +
					'<h1>Ready?</h1>' +
					'Selected map: ' + mapname + ' map' +
					'<br><br>' +
					'Player 1 username: <input onchange="loadplayer();" type="text" style="background-color: cyan; color: black; text-align: left; font-family: comic sans ms; font-size: 24px;" value="' + player1 + '">' +
					'<br>' +
					'Player 2 username: <input onchange="loadplayer();" style="background-color: cyan; color: black; text-align: left; font-family: comic sans ms; font-size: 24px;" type="text" value="' + player2 + '">' +
					'<br><br>' +
					'Game length: <input value="5" onchange="checkno()" id="timein" type="number" style="font-size: 24px; text-align: center; background-color: cyan; color: black; font-family: comic sans ms;"> <span id="units">minutes </span>' +
					'<button id="unitbutton" onclick="changeunit()">Change to seconds</button>' +
					'<br>' +
					'<button onclick="inftime()">Set to infinite</button>' +
					'<br><br>' +
					'<button style="font-size: 40px;" onclick="map' + mapid + '()">Start!</button>';
			}
			function enablesave() {
				if (localyes == false) {
					localyes = true;
					localStorage.setItem('localyes', true);
					document.getElementById('savebutton').innerText =
						'Disable local saving and delete data';
				} else {
					var clearallnow = confirm('Disable all saving mechanisms and clear all saved data?');
					if (clearallnow == true) {
						localyes = false;
						document.getElementById('savebutton').innerText =
							'Enable local saving';
						localStorage.removeItem('player1');
						localStorage.removeItem('player2');
						localStorage.removeItem('localyes');
						localStorage.removeItem('p1total');
						localStorage.removeItem('p2total');
						localStorage.clear();
						location.replace('');
					}
				}
			}
			function loadlocal() {
				if (localStorage.getItem('localyes')) {
					if (localStorage.getItem('map1vis')) {
						map1vis = parseInt(localStorage.getItem('map1vis'));
					}
					if (localStorage.getItem('map2vis')) {
						map2vis = parseInt(localStorage.getItem('map2vis'));
					}
					if (localStorage.getItem('map3vis')) {
						map3vis = parseInt(localStorage.getItem('map3vis'));
					}
					if (localStorage.getItem('map4vis')) {
						map4vis = parseInt(localStorage.getItem('map4vis'));
					}
					if (localStorage.getItem('map5vis')) {
						map5vis = parseInt(localStorage.getItem('map5vis'));
					}
					if (localStorage.getItem('map6vis')) {
						map6vis = parseInt(localStorage.getItem('map6vis'));
					}
					if (localStorage.getItem('totaltime')) {
						totaltime = parseInt(localStorage.getItem('totaltime'));
					}
					if (localStorage.getItem('player1')) {
						player1 = localStorage.getItem('player1');
					}
					if (localStorage.getItem('player2')) {
						player2 = localStorage.getItem('player2');
					}
					if (localStorage.getItem('p1total')) {
						p1total = parseInt(localStorage.getItem('p1total'));
					}
					if (localStorage.getItem('p2total')) {
						p2total = parseInt(localStorage.getItem('p2total'));
					}
					if (localStorage.getItem('totalgames')) {
						totalgames = parseInt(localStorage.getItem('totalgames'));
					}
					localyes = true;
					document.getElementById('savebutton').innerText = 
						'Disable local saving and delete data';
				}
			}
			function showstats() {
				var totalmin = totaltime / 60;
				var bannerin = '<div style="background-color: red; color: yellow;">' +
									'<b>Notice</b>' +
									'<br>' +
									'Stats for this game work best when data is saved over multiple visits. Use the button at the bottom of the main window to enable local saving, so this page can show cumulative data.' +
								'</div>';
				if (localStorage.getItem('localyes')) {
					bannerin = '';
				}
				var win2 = open('about:blank', 'win2', 'width=600', 'height=600');
				win2.document.open();
				win2.document.write(
					'<html>' +
						'<head>' +
							'<title>Tag Stats ~ Penguin Gamez</title>' +
							'<link rel="stylesheet" href="Style1.css">' +
						'</head>' +
						'<body>' +
							'<br>' + bannerin +
							'<h1>Tag Stats</h1>' +
							'Total tags by ' + player1 + ': ' + p1total +
							'<br>' +
							'Total tags by ' + player2 + ': ' + p2total +
							'<br><br>' +
							'Total games played: ' + totalgames +
							'<br><br>' +
							'Total time spent ingame: ' + totaltime + ' seconds (' + totalmin + ' minutes)' +				
							'<br><br>' +
							'Played Outer Space map ' + map1vis + ' times' +
							'<br>' +
							'Played Backyard map ' + map2vis + ' times' +
							'<br>' +
							'Played Classic map ' + map3vis + ' times' +
							'<br>' +
							'Played Garden map ' + map4vis + ' times' +
							'<br>' +
							'Played Empty map ' + map5vis + ' times' +
							'<br>' +
							'Played Road map ' + map6vis + ' times' +
						'</body>' +
					'</html>'
					);
				win2.document.close();
			}
		</script>
	</head>
	<body onload="loadlocal()" id="body">
		<a href="index.html">Back</a>
		<h1>Tag</h1>
		<center>
			<div id="content" style="cursor: wait;">
				Loading game...
				<br>
				<progress max="100" value="0" id="progbar"></progress>
			</div>
			<button id="savebutton" onclick="enablesave()">Enable local saving</button>
			~
			<button onclick="showstats()">Open Stats</button>
		</center>
	</body>
</html>
