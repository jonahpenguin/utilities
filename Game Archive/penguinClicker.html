            function startpenguinfarm() {
                if (penguinfarm == false) {
                    if (penguins > 999) {
                        penguins = penguins - 1000;

                        autoclickconf('Penguins now generate penguins');

                        setInterval(() => {pengfarm();}, 1000);

                    }
                }

                var penguintotal = Math.floor(penguins/10) - 1;
                var penguincount = 0;
                while (penguincount < penguintotal) {
                    addpeng();
                    penguincount++;
                }

            function delsave() {
                var clearall = confirm('Delete all save data?');
                if (clearall == true) {
                    autosave = false;
                    clearInterval(saveint);
                    document.getElementById('autosavebutton').innerText = 'Turn on automatic saving (same as save but automatic)';
		    localStorage.clear();
                    autoclickconf('Save data deleted');
                }
            }
            function enableautostart() {
                if (autosave == false) {
                    saveint = setInterval(() => {
                        localStorage.setItem('penguins', penguins);
                        localStorage.setItem('penguinsps', penguinsps);
                        localStorage.setItem('progressval', progressval);
                        if (lagred) {
                            localStorage.setItem('lagred', true);
                        } else {
                            localStorage.removeItem('lagred');
                        }
                        autoclickconf('Saved');
                    }, 30000);
                    document.getElementById('autosavebutton').innerText = 'Turn off automatic saving';
                    autosave = true;
                    localStorage.setItem('autosave', true);
                } else {
                    autosave = false;
                    localStorage.removeItem('autosave');
                    clearInterval(saveint);
                    document.getElementById('autosavebutton').innerText = 'Turn on automatic saving (same as save but automatic)';
                }
            }

            function exportsave() {
        let file = new File([btoa(penguins) + '&' + btoa(penguinsps) + '&' + btoa(clickval) + '&'], 'PenguinClickerSave.txt', {
  type: 'text/plain',
})
  const link = document.createElement('a')
  const url = URL.createObjectURL(file)
  link.href = url
  link.download = file.name
  document.body.appendChild(link)
  link.click()
  document.body.removeChild(link)
  window.URL.revokeObjectURL(url)
            }
            let imported;
            window.addEventListener('load', () => {
                document.getElementById('userimport') 
            .addEventListener('change', function() { 
              
            let fr=new FileReader(); 
            fr.onload=function(){ 
                imported=fr.result;
            } 
              
            fr.readAsText(this.files[0]);
        }) }, false);
        function importsave() {
                let isinvalid = false;
                imported = imported.split('&');
                imported[0] = atob(imported[0]);
                imported[1] = atob(imported[1]);
                if (parseInt(imported[0]) != NaN) {
                    penguins = parseInt(imported[0]);
                } else {
                    isinvalid = true;
                }
                if (parseInt(imported[1]) != NaN) {
                    let lpenguinsps = parseInt(imported[1]);
                    setInterval(() => {penguins = penguins + lpenguinsps; document.getElementById('pengout').value = penguins + ' penguins';}, 1000);
                } else {
                    isinvalid = true;
                }
		if (parseInt(imported[2]) != NaN) {

		}
                if (isinvalid) {
                    alert('Some data was not imported due to invalid save data.');
                }
                closeexim();
            }

                if (usekey) {

                }
