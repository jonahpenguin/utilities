function run(userin) {
    let returnval;
    try {
        returnval = eval(userin);
    } catch (e) {
        if (e instanceof TypeError) {
            returnval = 'TypeError: ' + e.message;
        } else if (e instanceof RangeError) {
            returnval = 'RangeError: ' + e.message;
        } else if (e instanceof EvalError) {
            returnval = 'EvalError: ' + e.message;
        } else {
            returnval = 'Unknown Error: ' + e.message;
        }
    }
    if (showret) {
        document.getElementById('cmdin').value = returnval;
    }
    location.href='#cmdin';
}
class Wall {
    constructor(x, y, show = true) {
        this.x = x;
        this.y = y;
        this.id = 'wall' + walls.length;
        this.shown = show;
        if (show) {
            let newwall = document.createElement('div');
            newwall.setAttribute('class', 'wall');
            newwall.setAttribute('id', 'wall' + walls.length);
            newwall.style.top = y + '%';
            newwall.style.left = x + '%';
            document.getElementById('body').appendChild(newwall);
        }
    }
}

// Function for loading level maps; only supports walls, and only in this game
function loadlevel(id,custom=0,startpos=0,finpos=0) {
    document.body.style.backgroundColor = 'darkblue';
    playingUL = false;
    let canflash;
    if (document.getElementById('contbutton')) {
        if (document.getElementById('contbutton').innerText == 'Next level!') {
            canflash = true;
        }
    } else if (document.getElementById('devb')) {
        canflash = true;
    } else {
        canflash = false;
    }
    document.body.style.cursor = 'none';
    prepload();
    currentlevel = parseInt(id);
    document.getElementById('body').innerHTML = '';
    loadmovement();
    totalAtt++;
    savestats();
    if (custom != 0 || id>100) {
        if (id>100) {
            id = id-100;
            playingUL = parseInt(id);
            custom = custLevels[id].data;
        }
        let ldata = custom.split('-');
        let i = 0;
        while(i<ldata.length) {
            let wallData = ldata[i].split('&');
            walls.push(new Wall(wallData[0], wallData[1]));
            i++;
        }
        if (ldata.includes('^')) {
            startpos = ldata.split('^');
            startpos = ldata[1].split('&');
            player.x = parseInt(startpos[0]);
            player.y = parseInt(startpos[1]);
            updateplayer();
        }
    } else {
        if (id != 99) {
            let ldata;
            if (levelData[id].includes('^')) {
                ldata = levelData[id].split('^');
                startpos = ldata[1];
                ldata = ldata[0];
            }
            if (levelData[id].includes('&')) {
                ldata = levelData[id].split('-');
                let i = 0;
                while(i<ldata.length) {
                    let wallData = ldata[i].split('&');
                    walls.push(new Wall(wallData[0], wallData[1]));
                    i++;
                }
            } else {
                let contAnyway = confirm('Level data missing or corrupted. Continue anyway?')
                if (!contAnyway) {
                    levellist();
                }
            }
        } else {
            let ldata;
            if (noahsMonstrocity.includes('^')) {
                ldata = noahsMonstrocity.split('^');
                startpos = ldata[1];
                ldata = ldata[0];
            }
            if (noahsMonstrocity.includes('&')) {
                ldata = noahsMonstrocity.split('-');
                let i = 0;
                while(i<ldata.length) {
                    let wallData = ldata[i].split('&');
                    walls.push(new Wall(wallData[0], wallData[1]));
                    i++;
                }
            } else {
                let contAnyway = confirm('Level data missing or corrupted. Continue anyway?')
                if (!contAnyway) {
                    levellist();
                }
            }
        }
    }
    if (startpos == 0) {
        player.x = 45;
        player.y = 90;
    } else {
        let newStart = startpos.split('&');
        player.x = parseInt(newStart[0]);
        player.y = parseInt(newStart[1]);
    }
    if (playingUL != false) {
        let ldata = custLevels[playingUL].data;
        if (ldata.includes('^')) {
            let startpos = ldata.split('^');
            startpos = startpos[1].split('&');
            player.x = parseInt(startpos[0]);
            player.y = parseInt(startpos[1]);
            updateplayer();
        }
    }
    updateplayer();
    canmove = true;
    if (!isMaker) {
        if (practicing) {
            let str;
            if (usecol) {
                str = 'Enable';
            } else {
                str = 'Disable';
            }
            let ncb = document.createElement('button');
            ncb.innerText = str+' Noclip';
            ncb.addEventListener('click', toggleNC);
            ncb.setAttribute('id', 'ncbutton');
            ncb.style = 'position:fixed;bottom:0;left:0;';
            document.getElementById('body').appendChild(ncb);
        }
        let leaveb = document.createElement('button');
        leaveb.innerText = 'Quit';
        leaveb.style = 'position:fixed;top:0;left:0;'
        leaveb.setAttribute('id', 'escb');
        leaveb.addEventListener('click', () => {
            if (!isFrozen) {
                let issure = confirm('Quit level?');
                if (issure) {
                    canmove = false;
                    if (playingUL == false) {
                        levellist();
                    } else {
                        openCust();
                    }
                }
            } else {
                alert('How can you quit a level during this awesome event? :)')
            }
        }, false);
        document.getElementById('body').appendChild(leaveb);
    }
    if (playingUL == false && showName) {
        addName(id,false);
    }
    let nb = document.createElement('button');
    nb.style = 'position:fixed;bottom:0;right:0;';
    nb.innerText = 'Toggle Level Banner';
    nb.addEventListener('click', toggleBanner);
    document.getElementById('body').appendChild(nb);
    let fl = document.createElement('img');
    fl.src = 'https://codehs.com/uploads/0f778efadcd65096d3cf6fb96447aeb4';
    if (finpos == 0) {
        cfpos = [85,0];
        fl.style = 'position:fixed;top:0;left:85%;width:15%;height:10%;z-index:9999;border:none;';
    } else {
        let fpos = finpos.split('&');
        fl.style = 'position:fixed;top:' + fpos[1] + '%;left:' + fpos[0] + '%;width:15%;height:10%;z-index:9999;border:none;';
        cfpos = finpos.split('&');
    }
    document.getElementById('body').appendChild(fl);
    if (document.getElementById('notifbox')) {
        if (document.getElementById('notifbox').innerText.includes('Invis') && document.getElementById('playerdiv')) {
            document.getElementById('playerdiv').style.display = 'none';
        } else {
            if (document.getElementById('playerdiv')) {
                document.getElementById('playerdiv').style.display = '';
            }
        }
    } else {
        if (document.getElementById('playerdiv')) {
            document.getElementById('playerdiv').style.display = '';
        }
    }
    // Sample wall: 'x&y-'
    if (currentlevel == 30) {
        let fp = document.createElement('div');
        fp.innerHTML = '<span style="background-color:red;color:white;">Final level!</span>';
        fp.setAttribute('id', 'fp');
        fp.style = 'position:fixed;top:45%;left:40%;font-size:48px;opacity:1;';
        document.getElementById('body').appendChild(fp);
        let opacity = 1;
        setTimeout(() => {
            let fadeint = setInterval(() => {
                if (document.getElementById('fp')) {
                    opacity = opacity - 0.1;
                    document.getElementById('fp').style.opacity = opacity;
                    if (opacity <= 0) {
                        document.getElementById('fp').outerHTML = '';
                        clearInterval(fadeint);
                    }
                } else {
                    clearInterval(fadeint);
                }
            }, 10);
        }, 1000);
    }
    if (document.getElementById('notifbox')) {
        if (document.getElementById('notifbox').innerText.includes('Freeze')) {
            canmove=false;
        }
    }
}

                    }

            reddiv.style.zIndex = 2.5;
            reddiv.style.backgroundColor = 'red';

            reddiv.style.top = 0;
            reddiv.style.width = '100%';
            reddiv.style.height = '100%';
            reddiv.style.opacity = 0.1;
            reddiv.setAttribute('id', 'redDiv');
            document.getElementById('body').appendChild(reddiv);
            let rd = document.getElementById('redDiv');
            let i = 0.1;
            let nextflash;
            let flashint = setInterval(() => {
                if (i < 0.5) {
                    i = i + 0.1;
                    rd.style.opacity = i;
                } else {
                    nextflash = setInterval(() => {
                        if (i > -1) {

                            rd.style.opacity = i;

                            }

                    }, 30);
                    clearInterval(flashint);
                }
            }, 30);
        }

window.addEventListener('keyup', (event) => {
    switch(event.key) {
        case 'ArrowUp':
        case 'w':
            if (ismoving) {
                ismoving = false;
                clearInterval(moveinterval);
                updateplayer();
            }
            break;
        case 'ArrowDown':
        case 's':

                let issure = confirm('Delete all save data and reset game?\nThis cannot be undone');
                if (issure) {
                    if (localStorage.getItem('SGusedRando')) {
                        localStorage.removeItem('SGusedRando');
                    }
                    if (localStorage.getItem('SGSgameTime')) {
                        localStorage.removeItem('SGSgameTime');
                        localStorage.removeItem('SGSULcomps');
                        localStorage.removeItem('SGStotalAtt');
                        localStorage.removeItem('SGSarrowKeys');
                        localStorage.removeItem('SGSfailedAtt');
                    }
                    if (localStorage.getItem('SGnolbanner')) {

                    }

                    }

            }
        // Generic popup function; opens popup and takes a parameter for html inside the popup, and uses fancy semi to fade out background. Also makes sure the popup doesn't already exist
        function popup(html) {
            if (!document.getElementById('popup')) {
                let pop = document.createElement('div');
                pop.style = 'position:fixed;z-index:11;top:10%;left:10%;height:80%;width:80%;background-color:blue;border:3px dashed cyan;';
                pop.innerHTML = html;
                pop.setAttribute('id', 'popup');
                let semi = document.createElement('div');
                semi.style = 'position:fixed;z-index:10;top:0;left:0;height:100%;width:100%;background-color:black;opacity:0.5;';
                semi.setAttribute('id', 'semi');
                document.getElementById('body').appendChild(pop);
                document.getElementById('body').appendChild(semi);
            }
        }
        // Closes popup opened by popup()
        function closepop() {
            if (canclose) {
                document.getElementById('semi').outerHTML = '';
                document.getElementById('popup').outerHTML = '';
            }
        }
