<html>
    <head>
        <title>DVD logo</title>
        <link rel="icon" href="dvd.png">
        <style>
            body {
                background-color: black;
                color: lime;
                font-family: "comic sans ms", helvetica;
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
            }
            img.dvd {
                position: fixed;
                width: 8%;
                height: 14%;
                z-index: 1;
            }
            button {
                background-color: white;
                color: black;
            }
            button:hover {
                background-color: black;
                color: white;
            }
            button:focus {
                background-color: black;
                color: white;
            }
            button.new {
                background-color: rgb(236, 219, 117);
                color: black;
            }
            button.new:hover {
                background-color: gold;
                color: black;
                font-style: italic;
            }
            button.new:focus {
                background-color: gold;
                color: black;
                font-style: italic;
            }
        </style>
        <script>
            let useCol = false;
            let dvdImg = 'dvd.png';
            let dvdCount = 1;
            let canMove = true;
            let spinInts = [];
            
            window.addEventListener("mousemove", actionHandler);

            let hideMouseInt;
            function actionHandler() {
                document.body.style.cursor = '';
                if (hideMouseInt) {
                    clearTimeout(hideMouseInt)
                }
                hideMouseInt = setTimeout(() => {
                    // Used to determine if an option has been selected
                    if (selectedAction != 0) {
                        document.body.style.cursor = 'none';
                    }
                }, 1000);
            }

            function popup(html) {
                // Generic popup
                if (document.getElementById('popup')) {
                    // Prevent multiple popups
                    return;
                }
                let pop = document.createElement('div');
                pop.style = "text-align:center;z-index:10;position:fixed;top:10%;left:10%;width:80%;height:80%;border:3px dashed #167cab;";
                pop.innerHTML = html;
                pop.setAttribute("id", "popup");
                let semi = document.createElement('div');
                semi.style = "z-index:9;position:fixed;top:0;left:0;width:100%;height:100%;background-color:black;opacity:0.5;";
                semi.setAttribute("id", "semi");
                document.body.appendChild(semi);
                document.body.appendChild(pop);
            }
            function closepop() {
                // Close generic popup
                if (document.getElementById("popup") && document.getElementById("semi")) {
                    document.getElementById('popup').outerHTML = '';
                    document.getElementById('semi').outerHTML = '';
                } else {
                    console.log("Blocked closepop()");
                }
            }

            function openOriginal() {
                window.open("https://utilities-8tvg.onrender.com/dvd.html");
                document.activeElement.blur();
            }

            function openFullscreen() {
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                }
            }

            function showMenu(id) {
                closepop();
                switch(id) {
                    case 1:
                        // Multiple dvd logos
                        popup(
                            "<button onclick='mainMenu()' style='float:left;'>Back</button><br><h1>DVD v2</h1><h2>Modes that add multiple DVD logos</h2>" +
                            "<button onclick='init(2)'>Add logo on collision</button><br><br>" +
                            "<button onclick='init(7)'>Add logo after a certain amount of time</button><br><br>" +
                            "<button onclick='init(11)'>Add logo in the top left after a certain amount of time</button>"
                        )
                        break;
                    case 2:
                        // Affect speed/slope
                        popup(
                            "<button onclick='mainMenu()' style='float:left;'>Back</button><br><h1>DVD v2</h1><h2>Modes that affect speed/slope</h2>" +
                            "<button onclick='init(1)'>Increase speed on collision</button><br><br>" +
                            "<button onclick='init(3)'>Set random slope on collision</button><br><br>" +
                            "<button onclick='init(3.5)'>Set random slope on collision (but they leave if you add enough)</button><br><br>" +
                            "<button class='new' onclick='init(12)'>Set random slope every 1/2 seconds [NEW]</button>"
                        )
                        break;
                    case 3:
                        // Spin
                        popup(
                            "<button onclick='mainMenu()' style='float:left;'>Back</button><br><h1>DVD v2</h1><h2>Modes that affect speed/slope</h2>" +
                            "<button onclick='init(5)'>Set random spin (unique per logo) on collision</button><br><br>" +
                            "<button onclick='init(5.5)'>Set random spin (identical across logos) on collision</button>"
                        )
                        break;
                    case 100:
                        // Combination modes
                        popup(
                            "<button onclick='mainMenu()' style='float:left;'>Back</button><br><h1>DVD v2</h1><h2>Combination modes (the fun stuff)</h2>" +
                            "<button onclick='init(4)'>Add logo, increase speed, and set random slope on collision (will crash soon after starting)</button><br><br>" +
                            "<button onclick='init(6)'>Set both random spin and random slope on collision</button><br><br>" +
                            "<button onclick='init(8)'>Increase speed on collision and add logo on collision</button><br><br>" +
                            "<button onclick='init(9)'>Spin, and add logo after 1 sec while not moving</button><br><br>" +
                            "<button onclick='init(10)'>Spin, and add logo after a custom amount of time</button><br><br>" +
                            "<button class='new' onclick='init(13)'>Random slope every 1/2 second with random pauses [NEW]</button><br><br>" +
                            "<button onclick='init(100)'>All. Of. Them. (will crash soon after starting)</button>"
                        )
                        break;
                }
            }
            let recentbounce = [false];

            function checkconfetti() {
                if (recentbounce) {
                    confetti();
                } else {
                    recentbounce = true;
                    setTimeout(() => {recentbounce = false;}, 10);
                }
            }
            function confetti() {
                document.body.style.backgroundImage = "url('confetti.webp')";
                setTimeout(() => {
                    document.body.style.backgroundImage = "none";
                }, 1000);
            }
            function toggleSubway() {
                if (document.getElementById('brainVid1').style.display == 'none') {
                    document.getElementById('brainVid1').style.display = '';
                } else {
                    document.getElementById('brainVid1').style.display = 'none';
                }
            }

            function runCmd(input=0) {
                if (input != 0 && input != null && input != undefined && input != "") {
                    try {
                        alert(eval(input));
                    } catch (e) {
                        alert(e.message);
                    }
                }
            }

            function toggleCol(elem) {
                if (useCol) {
                    useCol = false;
                    elem.innerText = "Enable Collision [BETA]";
                } else {
                    useCol = true;
                    elem.innerText = "Disable Collision [BETA]";
                }
            }

            function mainMenu() {
                let d = new Date();
                if (d.getDate() == 1 && d.getMonth() == 3) {
                    document.getElementById('dvd0').src = "IMG_6900.jpeg";
                }
                if (document.getElementById('popup')) {
                    closepop();
                }
                popup(
                    "<span style='position:fixed;top:0;right:0;'>Hit the Plus key to add another logo!</span>" +
                    "<button onclick='closepop();actionHandler()' style='float:left;'>X Close and play as normal</button>" +
                    "<button onclick='window.open(\"dvdMain.html\");this.blur();' style='float:right;'>More DVD stuff :)</button>" +
                    "<br><h1>DVD v2</h1>" +
                    "Fun things that didn't work in the original; hit Escape or reload to return to this menu<br>After crashing you may have to completely close the tab and reopen this page. This page may cause issues for photosensitive people, consider yourself warned :)<br><br>" +
                    "<button onclick='showMenu(1)'>Modes that add multiple DVD logos</button><br><br>" +
                    "<button class='new' onclick='showMenu(2)'>Modes that affect speed/slope [NEW]</button><br><br>" +
                    "<button onclick='showMenu(3)'>Modes that affect spin</button><br><br>" +
                    "<button class='new' onclick='showMenu(100)'>Combination modes (the fun stuff) [NEW]</button><br><br>" +
                    "<br><hr><br><br>" +
                    "<button onclick='runCmd(prompt(\"Enter a command:\"))'>Run cmd (dev)</button><br><br>" +
                    "<button onclick='toggleSubway()'>Toggle Subway Surfers</button><br><br>" +
                    "<button class='new' onclick='toggleCol(this)'>"+(useCol? "Disable Collision [BETA]" : "Enable Collision [BETA]")+"</button>"
                )
            }

            window.addEventListener('load', mainMenu, false);

            let sameSpin = false;
            let leaveMode = false;
            let positions = [
                {x:0,y:0}
            ]
            let slopes = [
                {rise:0.1,run:0.1}
            ]
            let int = setInterval(moveDVD, 5);
            let selectedAction = 0;
            function init(id, close=true) {
                if (id == 5.5) {
                    id = 5;
                    sameSpin = true;
                }
                if (id == 3.5) {
                    id = 3;
                    leaveMode = true;
                }
                selectedAction = parseInt(id);
                if (id == 5 || id == 6 || id == 100 || id == 9 || id == 10) {
                    for (let i = 0;i<positions.length;i++) {
                        document.getElementById('dvd'+i).style.rotate = "0deg";
                        spinInts[i] = setInterval(() => {
                            for (let j = 0;j<positions.length;j++) {
                                let rotVal = parseInt(document.getElementById('dvd'+j).style.rotate);
                                rotVal++;
                                document.getElementById('dvd'+j).style.rotate = rotVal+"deg";
                            }
                        }, 10);
                    }
                }
                if ((id == 2 || id == 4 || id == 100 || id == 8 || id == 11 || id == 9 || id == 10) && !document.getElementById('countDisp')) {
                    let elem = document.createElement('span');
                    elem.innerText = 'DVDs: '+dvdCount;
                    elem.style = 'position:fixed;bottom:0;left:0;z-index:2;';
                    elem.setAttribute("id", "countDisp");
                    document.body.appendChild(elem);
                }
                if (id == 7 || id == 100 || id == 9 || id == 10 || id == 11) {
                    let timeVal;
                    if (id == 100 || id == 9) {
                        timeVal = 1;
                    } else {
                        // For 7, 10 and 11
                        timeVal = prompt("Enter a time interval in seconds: ");
                    }
                    if (timeVal == "" || timeVal == undefined || timeVal == null) {
                        return;
                    }
                    if (isNaN(parseInt(timeVal))) {
                        alert("Invalid input")
                        return;
                    }
                    timeVal = parseFloat(timeVal)*1000;
                    if (id != 11) {
                        setInterval(addDVD, timeVal);
                    } else {
                        setInterval(() => {
                            addDVD(0,0);
                        }, timeVal);
                    }
                }
                /* Other IDs:
                    12: Random speed every 1/2 second
                */
                if (close) {
                    closepop();
                }
                actionHandler()
            }
            function handleAction(i) {
                if (recentbounce[i]) {
                    confetti();
                    recentbounce[i] = false;
                } else {
                    recentbounce[i] = true;
                    setTimeout(() => {
                        recentbounce[i] = false;
                    }, 10);
                }
                switch(selectedAction) {
                    case 1:
                        increaseSpeed(i);
                        break;
                    case 2:
                        addDVD();
                        break;
                    case 3:
                        randomSpeed(i);
                        break;
                    case 4:
                        increaseSpeed();
                        addDVD();
                        randomSpeed();
                        break;
                    case 5:
                        randomSpin(i);
                        break;
                    case 6:
                        randomSpin(i);
                        randomSpeed(i);
                        break;
                    case 8:
                        increaseSpeed(i);
                        addDVD();
                        break;
                    case 100:
                        increaseSpeed();
                        addDVD();
                        randomSpeed();
                        randomSpin(i);
                        break;
                }
            }
            let randomTimers = [0];
            function moveDVD() {
                if (!canMove || selectedAction == 9) {return;}
                for (let i = 0;i<positions.length;i++) {
                    positions[i].x += slopes[i].run;
                    positions[i].y += slopes[i].rise;
                    if (useCol) {
                        for (let j = 0;j<positions.length;j++) {
                            // No collision with self
                            if (j == i) {continue}

                            // Check x
                            if (positions[i].x+8 >= positions[j].x && positions[i].x <= positions[j].x+8) {
                                // Check y
                                if (positions[i].y >= positions[j].y && positions[i].y <= positions[j].y+14) {
                                    // Epic collision coding by Copilot, because I'm really bad at this :D
                                    const xOverlap = Math.min(positions[i].x + 8, positions[j].x + 8) - Math.max(positions[i].x, positions[j].x);
                                    const yOverlap = Math.min(positions[i].y + 14, positions[j].y + 14) - Math.max(positions[i].y, positions[j].y);

                                    // Reflect along the axis of least penetration so diagonal collisions bounce correctly.
                                    if (xOverlap < yOverlap) {
                                        slopes[i].run = -slopes[i].run;
                                        // Adjust position to separate based on which side was hit
                                        if (positions[i].x + 4 < positions[j].x + 4) {
                                            positions[i].x = positions[j].x - 8;
                                        } else {
                                            positions[i].x = positions[j].x + 8;
                                        }
                                    } else {
                                        slopes[i].rise = -slopes[i].rise;
                                        // Adjust position to separate based on which side was hit
                                        if (positions[i].y + 7 < positions[j].y + 7) {
                                            positions[i].y = positions[j].y - 14;
                                        } else {
                                            positions[i].y = positions[j].y + 14;
                                        }
                                    }
                                }
                            }
                        }
                    }

                    // Increment random timers
                    randomTimers[i]++;
                    if (randomTimers[i] >= 50) {
                        randomTimers[i] = 0;
                        // Checks to make sure that the logo won't get stuck in a wall
                        if ((selectedAction == 12 || selectedAction == 13 || selectedAction == 100) && positions[i].x > 1.1 && positions[i].x < 91 && positions[i].y > 1.1 && positions[i].y < 85) {
                            randomSpeed(i);
                        }
                    }
                    
                    if (selectedAction == 13 || selectedAction == 100) {
                        let roll = Math.floor(Math.random()*10000);
                        if (roll <= 10) {
                            canMove = false;
                            setTimeout(() => {
                                if (!canMove) {
                                    canMove = true;
                                }
                            }, 1000);
                        }
                    }

                    if (positions[i].x >= 92) {
                        handleAction(i);
                        slopes[i].run = -slopes[i].run
                        positions[i].x = 91.9;
                    }
                    if (positions[i].x <= 0) {
                        handleAction(i);
                        slopes[i].run = -slopes[i].run
                        positions[i].x = 0.1;
                    }

                    if (positions[i].y >= 86) {
                        handleAction(i);
                        slopes[i].rise = -slopes[i].rise
                        positions[i].y = 85.9;
                    }
                    if (positions[i].y <= 0) {
                        handleAction(i);
                        slopes[i].rise = -slopes[i].rise
                        positions[i].y = 0.1;
                    }

                   if (positions[i].x < 50.1 && positions[i].x > 49.9) {
                        // Position snapping for easier corners
                        /*
                        Corner list (x,y,rise,run):
                            Bottom right:
                                Corner: 91.9,86,0.1,0.1
                                X=50:   50,44.1,0.1,0.1
                            Top left:
                                Corner: 0.1,0.1,-0.1,-0.1
                                X=50:   50,50,-0.1,-0.1
                            Top right:
                                Corner: 91.9,0.1,-0.1,0.1
                                X=50:   50,42,-0.1,0.1
                            Bottom left:
                                Corner: 0.1,86,0.1,-0.1
                                X=50:   50,36.1,0.1,-0.1
                        */
                        if (slopes[i].rise == 0.1 && slopes[i].run == 0.1) {
                            // bottom right
                            if (positions[i].y > 43.1 && positions[i].y < 45.1) {
                                positions[i].y = 44.1;
                            }
                        }
                        if (slopes[i].rise == -0.1 && slopes[i].run == -0.1) {
                            // top left
                            if (positions[i].y > 49 && positions[i].y < 51) {
                                positions[i].y = 50;
                            }
                        }
                        if (slopes[i].rise == -0.1 && slopes[i].run == 0.1) {
                            // top right
                            if (positions[i].y > 41 && positions[i].y < 43) {
                                positions[i].y = 42;
                            }
                        }
                        if (slopes[i].rise == 0.1 && slopes[i].run == -0.1) {
                            // bottom left
                            if (positions[i].y > 35.1 && positions[i].y < 37.1) {
                                positions[i].y = 36.1;
                            }
                        }
                   }

                    document.getElementById('dvd'+i).style.top = positions[i].y+"%";
                    document.getElementById('dvd'+i).style.left = positions[i].x+"%";
                }
            }
            // setInterval(addDVD, 50);
            function randomSpeed(i) {
                if (!leaveMode) {
                    setTimeout(() => {
                        // for (let i = 0;i<slopes.length;i++) {
                            if (slopes[i].rise > 0) {
                                slopes[i].rise = Math.floor(Math.random()*10)/10;
                            } else {
                                slopes[i].rise = -Math.floor(Math.random()*10)/10;
                            }
                            if (slopes[i].run > 0) {
                                slopes[i].run = Math.floor(Math.random()*10)/10;
                            } else {
                                slopes[i].run = -Math.floor(Math.random()*10)/10;
                            }

                            if (slopes[i].rise < 0.1 && slopes[i].rise > -0.1) {
                                slopes[i].rise = 0.1;
                            }
                            if (slopes[i].run < 0.1 && slopes[i].run > -0.1) {
                                slopes[i].run = 0.1;
                            }
                        // }
                    }, 5);
                } else {
                    setTimeout(() => {
                        for (let i = 0;i<slopes.length;i++) {
                            if (slopes[i].rise > 0) {
                                slopes[i].rise = Math.floor(Math.random()*10)/10;
                            } else {
                                slopes[i].rise = -Math.floor(Math.random()*10)/10;
                            }
                            if (slopes[i].run > 0) {
                                slopes[i].run = Math.floor(Math.random()*10)/10;
                            } else {
                                slopes[i].run = -Math.floor(Math.random()*10)/10;
                            }

                            if (slopes[i].rise < 0.1 && slopes[i].rise > -0.1) {
                                slopes[i].rise = 0.1;
                            }
                            if (slopes[i].run < 0.1 && slopes[i].run > -0.1) {
                                slopes[i].run = 0.1;
                            }
                        }
                    }, 5);
                }
            }
            function increaseSpeed(i=-1) {
                if (i == -1) {
                    for (let j = 0;j<positions.length;j++) {  
                        if (slopes[j].rise > 0) {
                            slopes[j].rise += 0.1;
                        } else {
                            slopes[j].rise -= 0.1;
                        }
                        if (slopes[j].run > 0) {
                            slopes[j].run += 0.1;
                        } else {
                            slopes[j].run -= 0.1;
                        }
                    }
                } else {
                    if (slopes[i].rise > 0) {
                        slopes[i].rise += 0.1;
                    } else {
                        slopes[i].rise -= 0.1;
                    }
                    if (slopes[i].run > 0) {
                        slopes[i].run += 0.1;
                    } else {
                        slopes[i].run -= 0.1;
                    }
                }
            }
            function addDVD(x=-1,y=-1) {
                dvdCount++;
                randomTimers.push(0);
                if (document.getElementById('countDisp')) {
                    document.getElementById('countDisp').innerText = "DVDs: "+dvdCount;
                } else {
                    let elem = document.createElement('span');
                    elem.innerText = 'DVDs: '+dvdCount;
                    elem.setAttribute('id', 'countDisp');
                    elem.style = 'position:fixed;bottom:0;left:0;z-index:1;';
                    document.body.appendChild(elem);
                }
                let pos;
                if (x == -1 || y == -1) {
                    pos = {x:Math.floor(Math.random()*92),y:Math.floor(Math.random()*86)};
                } else {
                    pos = {x:x,y:y};
                }
                let elem = document.createElement("img");
                elem.setAttribute('id', "dvd"+positions.length);
                elem.setAttribute('class', 'dvd');
                let d = new Date();
                if (d.getMonth() == 3 && d.getDate() == 1) {
                    elem.src = "IMG_6900.jpeg";
                } else {
                    elem.src = dvdImg;
                }
                elem.style.left = pos.x+"%";
                elem.style.top = pos.y+"%";
                document.body.appendChild(elem);
                positions.push(pos)
                slopes.push({rise:0.1,run:0.1})

                // Ensuring spin works
                if (selectedAction == 5 || selectedAction == 5.5 || selectedAction == 6 || selectedAction == 9 || selectedAction == 10 || selectedAction == 100) {
                    for (let i = 0;i<positions.length;i++) {
                        if (spinInts[i]) {
                            clearInterval(spinInts[i]);
                        } else {
                            document.getElementById('dvd'+i).style.rotate = '0deg';
                        }
                        spinInts[i] = setInterval(() => {
                            for (let j = 0;j<positions.length;j++) {
                                let rotVal = parseInt(document.getElementById('dvd'+j).style.rotate);
                                rotVal++;
                                document.getElementById('dvd'+j).style.rotate = rotVal+"deg";
                            }
                        }, 10);
                    }
                }
            }
            function removeDVD() {
                if (dvdCount == 0) {
                    return;
                }
                randomTimers.pop();
                dvdCount--;
                if (document.getElementById('countDisp')) {
                    document.getElementById('countDisp').innerText = "DVDs: "+dvdCount;
                } else {
                    let elem = document.createElement('span');
                    elem.innerText = 'DVDs: '+dvdCount;
                    elem.setAttribute('id', 'countDisp');
                    elem.style = 'position:fixed;bottom:0;left:0;z-index:1;';
                    document.body.appendChild(elem);
                }
                positions.pop();
                slopes.pop();
                document.getElementById("dvd"+positions.length).outerHTML = '';
            }

            function randomSpin(i=0) {
                if (sameSpin) {
                    i = 0;
                }
                if (spinInts[i]) {
                    clearInterval(spinInts[i]);
                }
                let stepVal = Math.floor(Math.random()*180);
                let intVal = Math.floor(Math.random()*20)+10;
                if (sameSpin) {
                    spinInts[0] = setInterval(() => {
                        for (let i = 0;i<positions.length;i++) {
                            let rotVal = parseInt(document.getElementById('dvd'+i).style.rotate);
                            rotVal+=stepVal;
                            document.getElementById('dvd'+i).style.rotate = rotVal+"deg";
                        }
                    }, 10);
                } else {
                    spinInts[i] = setInterval(() => {
                        // for (let i = 0;i<positions.length;i++) {
                            let rotVal = parseInt(document.getElementById('dvd'+i).style.rotate);
                            rotVal+=stepVal;
                            document.getElementById('dvd'+i).style.rotate = rotVal+"deg";
                        // }
                    }, 10);
                }
            }
            function catMode() {
                if (document.getElementById('popup')) {
                    alert("Cat mode enabled!");
                    init(6);
                    setInterval(() => {
                        changeCol();
                        init(6,false);
                    }, 20);
                }
            }
            let lastCol = -1;
            let currentCol = -1;
            function setCol(col,i,update=true) {
                lastCol = parseInt(currentCol);
                currentCol = parseInt(col);
                if (update) {
                    for (let i = 0;i<positions.length;i++) {
                        document.getElementById('dvd'+i).style.filter = 'hue-rotate('+currentCol+'deg)';
                    }
                }
            }
            function toHue(colId) {
                switch(colId) {
                    case 1:return 50;
                    case 2:return 100;
                    case 3:return 150;
                    case 4:return 200;
                    case 5:return 250;
                    case 6:return 300;
                    case 7:return 350;
                    case 8:return 400;
                    case 9:return 450;
                    default:return 0;
                }
            }
            function changeCol(i) {
                let randoCol = Math.floor(Math.random()*9)+1;
                if (toHue(randoCol) == lastCol) {
                    if (randoCol <=9) {
                        randoCol++;
                    } else {
                        randoCol--;
                    }
                }
                switch(randoCol) {
                    case 1:
                        setCol(50,i);
                        break;
                    case 2:
                        setCol(100,i);
                        break;
                    case 3:
                        setCol(150,i);
                        break;
                    case 4:
                        setCol(200,i);
                        break;
                    case 5:
                        setCol(250,i);
                        break;
                    case 6:
                        setCol(300,i,false);
                        document.getElementById('dvd'+i).style.filter = 'invert()';
                        break;
                    case 7:
                        setCol(350,i,false);
                        document.getElementById('dvd'+i).style.filter = 'brightness(999)';
                        break;
                    case 8:
                        setCol(400,i,false);
                        document.getElementById('dvd'+i).style.filter = 'brightness(60%)';
                        break;
                    case 9:
                        setCol(450,i,false);
                        document.getElementById('dvd'+i).style.filter = 'sepia(100%)';
                        break;
                    default:
                        setCol(0);
                        break;
                }
            }
            let catVal = 0;
            window.addEventListener("mousedown", (event) => {
                if (document.getElementById('popup')) {
                    return;
                }
                let x = ((event.clientX/window.innerWidth)*100)-4;
                let y = ((event.clientY/window.innerHeight)*100)-7;
                if (x < 0) {
                    x = 0.1;
                }
                if (y < 0) {
                    y = 0.1;
                }
                if (x >= 92) {
                    x = 91.9;
                }
                if (y >= 86) {
                    y = 85.9;
                }
                addDVD(x,y);
            }, false);
            window.addEventListener("keydown", (event) => {
                if (event.key == " ") {
                    if (canMove) {
                        canMove = false;
                    } else {
                        canMove = true;
                    }
                }
                if (event.key == "Escape") {
                    selectedAction = 0;
                    mainMenu();
                }
                if (event.key == "r") {
                    for (let i=0;i<positions.length;i++) {
                        randomSpeed(i);
                    }
                }
                if (event.key == "+" || event.key == "=") {
                    addDVD();
                }
                if (event.key == "-" || event.key == "_") {
                    removeDVD();
                }
                if (event.key == "f") {
                    openFullscreen();
                }
                if (event.key == "c") {
                    catVal++;
                } else if (event.key == "a") {
                    catVal++;
                } else if (event.key == "t") {
                    catVal++;
                    if (catVal == 3) {
                        catMode();
                    }
                } else {
                    catVal = 0;
                }
            }, false);
        </script>
